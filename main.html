<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>主界面 - 儿童专注力训练</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 顶部导航栏 -->
  <div class="navbar">
    <div class="logo">专注力训练系统</div>
    <div class="nav-items">
      <div class="nav-item">历史数据</div>

      <!-- 切换孩子 → 悬浮菜单 -->
      <div class="nav-item dropdown">
        切换孩子
        <div class="dropdown-menu">
          <div class="dropdown-item">小明</div>
          <div class="dropdown-item">小红</div>
          <div class="dropdown-item">小刚</div>
          <div class="dropdown-item add-child">+ 添加孩子</div>
        </div>
      </div>

      <div class="nav-item" onclick="logout()">退出登录</div>
    </div>
  </div>

  <!-- 中间游戏选择区域 -->
  <div class="game-container">
    <h2>选择训练游戏</h2>
    <div class="game-box">
      <div class="game-item">视觉追踪训练</div>
      <div class="game-item">注意力集中训练</div>
      <div class="game-item">反应速度训练</div>
      <div class="game-item">记忆力训练</div>
    </div>
  </div>

  <!-- 退出确认弹窗 -->
  <div class="modal" id="logoutModal">
    <div class="modal-content">
      <h3>确定要退出登录吗？</h3>
      <button onclick="confirmLogout()">确定</button>
      <button onclick="closeLogout()" style="background:#666;">取消</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注意力全能小侦探 - 专注力训练平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #4CAF50 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .header .subtitle {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 8px;
        }

        .header .description {
            font-size: 0.95em;
            color: #888;
            max-width: 600px;
            margin: 0 auto;
        }

        .main-container {
            display: flex;
            min-height: 100vh;
            padding-top: 160px;
        }

        .left-section {
            width: var(--left-width);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .left-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: float 15s ease-in-out infinite;
        }

        .right-section {
            width: var(--right-width);
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .right-section::before {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: float 15s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            50% {
                transform: translate(30px, 30px) rotate(180deg);
            }
        }

        .section-content {
            position: relative;
            z-index: 1;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-title {
            font-size: 2.8em;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            position: relative;
            padding-bottom: 15px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.3s ease;
            opacity: 1;
            text-align: center;
        }

        .section-title.hiding {
            opacity: 0;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: white;
            border-radius: 2px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-title.vertical {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 2em;
            margin: 0;
            padding: 0;
            letter-spacing: 10px;
            opacity: 1;
        }

        .section-title.vertical::after {
            display: none;
        }

        .benefits-list {
            list-style: none;
            margin: 0;
            padding: 0;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            visibility: hidden;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        visibility 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        margin 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-expanded .benefits-list {
            opacity: 1;
            max-height: 400px;
            margin-bottom: 50px;
            visibility: visible;
        }

        .benefits-list li {
            font-size: 1.25em;
            margin-bottom: 20px;
            padding-left: 35px;
            position: relative;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-expanded .benefits-list li {
            opacity: 1;
            transform: translateY(0);
        }

        .section-expanded .benefits-list li:nth-child(1) { transition-delay: 0.15s; }
        .section-expanded .benefits-list li:nth-child(2) { transition-delay: 0.25s; }
        .section-expanded .benefits-list li:nth-child(3) { transition-delay: 0.35s; }
        .section-expanded .benefits-list li:nth-child(4) { transition-delay: 0.45s; }

        .benefits-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            top: 2px;
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            font-weight: bold;
        }

        .login-btn {
            display: inline-block;
            padding: 18px 50px;
            font-size: 1.2em;
            font-weight: 600;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        background 0.3s ease,
                        box-shadow 0.3s ease;
        }

        .section-expanded .login-btn {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            transition-delay: 0.55s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .left-section .login-btn:hover {
            background: #764ba2;
            border-color: #764ba2;
            color: white;
        }

        .right-section .login-btn:hover {
            background: #4CAF50;
            border-color: #4CAF50;
            color: white;
        }

        .section-expanded .section-content {
            align-items: center;
            text-align: left;
        }

        .section-expanded .section-title {
            text-align: left;
            align-self: flex-start;
        }

        .section-expanded .section-title::after {
            left: 0;
            transform: translateX(0);
        }

        .section-collapsed .section-content {
            align-items: center;
            text-align: center;
        }

        :root {
            --left-width: 50%;
            --right-width: 50%;
            --divider-position: 50%;
        }

        .divider-line {
            position: absolute;
            top: 160px;
            bottom: 60px;
            left: var(--divider-position);
            width: 3px;
            background: linear-gradient(to bottom, 
                transparent 0%, 
                rgba(255, 255, 255, 0.8) 20%, 
                rgba(255, 255, 255, 0.8) 80%, 
                transparent 100%);
            z-index: 10;
            transform: translateX(-50%);
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .divider-line::before,
        .divider-line::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        .divider-line::before {
            top: 20%;
        }

        .divider-line::after {
            bottom: 20%;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .footer-login-btn {
            display: inline-block;
            padding: 12px 40px;
            font-size: 1.1em;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #4CAF50 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .footer-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                padding-top: 180px;
            }

            .left-section,
            .right-section {
                width: 100% !important;
                min-height: 50vh;
                padding: 40px 30px;
            }

            .section-title {
                font-size: 2em;
            }

            .benefits-list li {
                font-size: 1.1em;
            }

            .divider-line {
                display: none;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .header .subtitle {
                font-size: 1em;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>注意力全能小侦探</h1>
        <p class="subtitle">专为6-12岁儿童设计的注意力训练平台</p>
        <p class="description">通过科学的训练方法和趣味游戏，帮助孩子提升专注力，培养良好学习习惯</p>
    </div>

    <div class="main-container">
        <div class="left-section">
            <div class="section-content">
                <h2 class="section-title">家长端</h2>
                <ul class="benefits-list">
                    <li>查看孩子训练报告</li>
                    <li>管理孩子信息</li>
                    <li>浏览知识文章</li>
                    <li>参与家长论坛</li>
                </ul>
            </div>
        </div>

        <div class="divider-line"></div>

        <div class="right-section">
            <div class="section-content">
                <h2 class="section-title">孩子端</h2>
                <ul class="benefits-list">
                    <li>趣味注意力训练游戏</li>
                    <li>个性化训练计划</li>
                    <li>成长记录与奖励</li>
                    <li>互动学习体验</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 注意力全能小侦探 - 专注力训练平台 | 让每个孩子都能专注成长</p>
        <a href="login.html" class="footer-login-btn">立即登录</a>
    </div>

    <script src="utils.js"></script>
    <script>
        const root = document.documentElement;
        const leftSection = document.querySelector('.left-section');
        const rightSection = document.querySelector('.right-section');
        const dividerLine = document.querySelector('.divider-line');
        const leftTitle = leftSection.querySelector('.section-title');
        const rightTitle = rightSection.querySelector('.section-title');

        function setLayoutState(state) {
            leftSection.classList.remove('section-expanded', 'section-collapsed');
            rightSection.classList.remove('section-expanded', 'section-collapsed');
            leftTitle.classList.remove('vertical');
            rightTitle.classList.remove('vertical');

            switch(state) {
                case 'left':
                    root.style.setProperty('--left-width', '70%');
                    root.style.setProperty('--right-width', '30%');
                    root.style.setProperty('--divider-position', '70%');
                    leftSection.classList.add('section-expanded');
                    rightSection.classList.add('section-collapsed');
                    rightTitle.classList.add('vertical');
                    break;
                case 'right':
                    root.style.setProperty('--left-width', '30%');
                    root.style.setProperty('--right-width', '70%');
                    root.style.setProperty('--divider-position', '30%');
                    leftSection.classList.add('section-collapsed');
                    rightSection.classList.add('section-expanded');
                    leftTitle.classList.add('vertical');
                    break;
                default:
                    root.style.setProperty('--left-width', '50%');
                    root.style.setProperty('--right-width', '50%');
                    root.style.setProperty('--divider-position', '50%');
            }
        }

        setLayoutState('default');

        leftSection.addEventListener('mouseenter', () => setLayoutState('left'));
        leftSection.addEventListener('mouseleave', () => setLayoutState('default'));

        rightSection.addEventListener('mouseenter', () => setLayoutState('right'));
        rightSection.addEventListener('mouseleave', () => setLayoutState('default'));

        window.onload = function () {
            const userInfo = StorageUtil.getItem('userInfo');
            if (userInfo) {
                if (userInfo.role === 'child') {
                    window.location.href = 'child-home.html';
                } else if (userInfo.role === 'parent') {
                    window.location.href = 'profile.html';
                }
            }
        };
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>环保小卫士 - 抑制控制训练游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: url('../images/ground15.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        /* 游戏容器 */
        .game-container {
            background: #fef9e6;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 0 0 10px #B0D561, 0 0 0 15px #599958;
            max-width: 550px;
            width: 100%;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* 头部信息栏 */
        .game-header {
            background: #2c3e2f;
            padding: 16px 24px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .back-btn {
            background: #183b00;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            background: #A8D58D;
        }

        .back-btn:active {
            transform: scale(0.96);
            background: #85b068;
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .stat-icon {
            font-size: 1.2rem;
        }

        .difficulty-badge {
            background: #97C37A;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 主游戏区域 */
        .game-area {
            padding: 30px 24px;
        }

        /* 开始界面 */
        .start-screen {
            text-align: center;
            padding: 20px 0;
        }

        .game-title {
            font-size: 36px;
            color: #2c5e2d;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .game-subtitle {
            font-size: 18px;
            color: #5a7a5a;
            margin-bottom: 30px;
        }

        .game-description {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 30px;
            text-align: left;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .game-description p {
            margin-bottom: 12px;
            font-size: 16px;
            line-height: 1.4;
            color: #4a3b1f;
        }

        .difficulty-selector {
            margin-bottom: 30px;
        }

        .difficulty-selector h4 {
            font-size: 18px;
            color: #2c5e2d;
            margin-bottom: 16px;
        }

        .difficulty-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .diff-btn {
            background: #f5e6d3;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            color: #4a3b1f;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            font-family: inherit;
        }

        .diff-btn:active {
            transform: scale(0.96);
            background: #e6d5bd;
        }

        .diff-btn.active {
            background: #97C37A;
            color: white;
        }

        .start-btn {
            background: #E1EE90;
            border: none;
            padding: 18px 40px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            font-family: inherit;
        }

        .start-btn:active {
            transform: scale(0.96);
        }

        /* 物品卡片 */
        .item-card {
            background: white;
            border-radius: 32px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            transition: transform 0.2s;
        }

        .item-image {
            font-size: 80px;
            margin-bottom: 16px;
            display: inline-block;
            background: #f0f0e8;
            padding: 20px;
            border-radius: 60px;
        }

        .item-name {
            font-size: 28px;
            font-weight: bold;
            color: #2d3e2b;
            margin-top: 12px;
        }

        /* 干扰文字区 */
        .distractor-box {
            background: #81B56A;
            border-radius: 28px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            border: 3px dashed #396B67;
        }

        .distractor-label {
            font-size: 25px;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .distractor-text {
            font-size: 36px;
            font-weight: bold;
            color: #396B67;
            background: white;
            display: inline-block;
            padding: 8px 28px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .instruction {
            text-align: center;
            font-size: 14px;
            color: #000000;
            margin: 12px 0 20px;
            background: rgba(255, 250, 219, 0.5);
            padding: 8px;
            border-radius: 30px;
        }

        /* 分类按钮 */
        .category-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 16px;
        }

        .cat-btn {
            background: #f5e6d3;
            border: none;
            padding: 16px 12px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #4a3b1f;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .cat-btn:active {
            transform: scale(0.96);
            background: #e6d5bd;
        }

        .cat-btn.disabled {
            opacity: 0.6;
            transform: none;
            pointer-events: none;
        }

        /* 反馈浮层 */
        .feedback-toast {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: white;
            padding: 16px 28px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            white-space: nowrap;
            z-index: 200;
            animation: fadeOut 0.8s forwards;
            pointer-events: none;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translate(-50%, -40%);
            }

            70% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
        }

        /* 计时条 */
        .timer-bar {
            height: 8px;
            background: #ddd;
            border-radius: 10px;
            margin: 16px 0 8px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            width: 100%;
            background: #6CBEC5;
            border-radius: 10px;
            transition: width linear 10ms;
        }

        .timer-text {
            font-size: 20px;
            text-align: right;
            color: #000000;
        }

        /* 结束面板 */
        .end-panel {
            background: white;
            margin: 20px;
            padding: 28px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .end-panel h3 {
            font-size: 28px;
            color: #2c5e2d;
            margin-bottom: 16px;
        }

        .restart-btn {
            background: #2c5e2d;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .restart-btn:active {
            transform: scale(0.96);
        }

        .hidden {
            display: none;
        }

        .feedback-emoji {
            font-size: 1.8rem;
        }

        @media (max-width: 500px) {
            .stat {
                font-size: 0.9rem;
                padding: 4px 10px;
            }

            .item-name {
                font-size: 22px;
            }

            .distractor-text {
                font-size: 26px;
            }

            .cat-btn {
                padding: 12px 8px;
                font-size: 0.9rem;
            }

            .game-title {
                font-size: 28px;
            }

            .start-btn {
                padding: 14px 32px;
                font-size: 1.1rem;
            }

            .diff-btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="game-container" id="gameContainer">
        <div class="game-header">
            <button class="back-btn" id="backBtn">←</button>
            <div class="stats">
                <div class="stat"><span class="stat-icon">🪙</span> <span id="coinCount">0</span></div>
                <div class="stat"><span class="stat-icon">⭐</span> <span id="scoreCount">0</span></div>
                <div class="stat"><span class="stat-icon">🎯</span> <span id="correctCount">0</span>/<span
                        id="totalCount">0</span></div>
            </div>
            <div class="difficulty-badge" id="difficultyBadge">
                <span>🌟</span> <span id="difficultyText">中等</span>
            </div>
        </div>

        <div id="gameMainArea" class="game-area">
            <!-- 开始界面 -->
            <div id="startScreen" class="start-screen">
                <h2 class="game-title">🌱 环保小卫士</h2>
                <h3 class="game-subtitle">抑制控制训练游戏</h3>
                <div class="game-description">
                    <p> <strong>游戏规则：</strong></p>
                    <p>• 忽略文字，根据图片的真实类别选择分类</p>
                    <p>• 越快回答，获得的金币越多</p>
                    <p>• 完成40个试次后训练结束</p>
                    <p>• 难度会根据你的表现自动调整</p>
                </div>
                <div class="difficulty-selector">
                    <h4>选择难度：</h4>
                    <div class="difficulty-buttons">
                        <button class="diff-btn" data-difficulty="easy">⭐ 简单</button>
                        <button class="diff-btn active" data-difficulty="medium">⭐⭐ 中等</button>
                        <button class="diff-btn" data-difficulty="hard">⭐⭐⭐ 困难</button>
                    </div>
                </div>
                <button class="start-btn" id="startBtn">开始训练</button>
            </div>
            <!-- 动态游戏内容会渲染在此 -->
        </div>
    </div>

    <script>
        // ========================
        // 游戏数据 & 研究参数 (基于Stroop范式，抑制控制训练)
        // 文献依据：方浩团队JMIR (2025)，ReStroop游戏 (arXiv 2025)
        // ========================
        const ITEMS = {
            '苹果核': { category: '厨余垃圾', emoji: '🍎', imageEmoji: '🍎' },
            '香蕉皮': { category: '厨余垃圾', emoji: '🍌', imageEmoji: '🍌' },
            '塑料瓶': { category: '可回收', emoji: '🧴', imageEmoji: '🧴' },
            '报纸': { category: '可回收', emoji: '📰', imageEmoji: '📰' },
            '电池': { category: '有害垃圾', emoji: '🔋', imageEmoji: '🔋' },
            '过期药品': { category: '有害垃圾', emoji: '💊', imageEmoji: '💊' },
            '脏纸巾': { category: '其他垃圾', emoji: '🧻', imageEmoji: '🧻' },
            '一次性餐具': { category: '其他垃圾', emoji: '🥢', imageEmoji: '🥢' }
        };
        const CATEGORIES = ['厨余垃圾', '可回收', '有害垃圾', '其他垃圾'];
        const CATEGORY_EMOJI = {
            '厨余垃圾': '🍂',
            '可回收': '♻️',
            '有害垃圾': '⚠️',
            '其他垃圾': '🗑️'
        };

        // 难度参数 (反应窗口基于849-969ms研究区间)
        const DIFFICULTY_SETTINGS = {
            easy: { timeLimit: 4000, incongruentRatio: 0.3, name: '简单', stars: '⭐' },
            medium: { timeLimit: 3500, incongruentRatio: 0.5, name: '中等', stars: '⭐⭐' },
            hard: { timeLimit: 2900, incongruentRatio: 0.7, name: '困难', stars: '⭐⭐⭐' }
        };

        // 言语鼓励库 (金币+语音表情鼓励: 研究证实最优)
        const ENCOURAGE_MSGS = [
            '🎉 真棒！', '⭐ 反应超快！', '🌟 你做到了！', '💪 完美分类！', '🎈 好厉害！', '🧠 抑制控制好强！'
        ];
        const GENTLE_FEEDBACK = [
            '🤔 再试试看~', '👀 注意看图片是什么', '💡 忽略文字哦', '🌱 没关系，再来一次'
        ];

        // 游戏状态
        let currentTrial = null;
        let active = false;
        let canRespond = false;
        let timerInterval = null;
        let startTime = 0;

        let gameState = {
            score: 0,
            coins: 0,
            correctCount: 0,
            totalCount: 0,
            currentDifficulty: 'medium',
            trialHistory: [],   // 用于自适应
            waitingNext: false
        };

        let timeoutId = null;

        // DOM 元素
        const container = document.getElementById('gameMainArea');
        const coinSpan = document.getElementById('coinCount');
        const scoreSpan = document.getElementById('scoreCount');
        const correctSpan = document.getElementById('correctCount');
        const totalSpan = document.getElementById('totalCount');
        const difficultyTextSpan = document.getElementById('difficultyText');
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const diffBtns = document.querySelectorAll('.diff-btn');

        // 难度选择
        diffBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                diffBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gameState.currentDifficulty = btn.getAttribute('data-difficulty');
            });
        });

        // 返回按钮点击事件
        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = '../child-home.html';
        });

        // 开始游戏按钮
        startBtn.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            startGame();
        });

        // 辅助函数
        function updateUIStats() {
            coinSpan.innerText = gameState.coins;
            scoreSpan.innerText = gameState.score;
            correctSpan.innerText = gameState.correctCount;
            totalSpan.innerText = gameState.totalCount;
            const diffObj = DIFFICULTY_SETTINGS[gameState.currentDifficulty];
            difficultyTextSpan.innerText = diffObj.name + ' ' + diffObj.stars;
        }

        function showFeedbackMessage(text, isGood) {
            const div = document.createElement('div');
            div.className = 'feedback-toast';
            div.innerHTML = isGood ? `✅ ${text}` : `💡 ${text}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 800);
        }

        function playCoinAnimation() {
            // 简单金币飘字感觉
        }

        // 生成不一致/一致试次 (Stroop核心)
        function generateTrial() {
            const itemNames = Object.keys(ITEMS);
            const randomItem = itemNames[Math.floor(Math.random() * itemNames.length)];
            const correctCategory = ITEMS[randomItem].category;
            const ratio = DIFFICULTY_SETTINGS[gameState.currentDifficulty].incongruentRatio;
            const isIncongruent = Math.random() < ratio;

            let distractorText;
            if (isIncongruent) {
                const otherCats = CATEGORIES.filter(c => c !== correctCategory);
                distractorText = otherCats[Math.floor(Math.random() * otherCats.length)];
            } else {
                distractorText = correctCategory;
            }

            return {
                itemName: randomItem,
                itemEmoji: ITEMS[randomItem].emoji,
                correctCategory: correctCategory,
                distractorText: distractorText,
                isIncongruent: isIncongruent,
                timeLimit: DIFFICULTY_SETTINGS[gameState.currentDifficulty].timeLimit
            };
        }

        // 渲染游戏界面
        function renderGame() {
            if (!currentTrial) return;
            const trial = currentTrial;
            const remainPercent = 100;
            const html = `
            <div class="item-card">
                <div class="item-image">${trial.itemEmoji}</div>
                <div class="item-name">${trial.itemName}</div>
            </div>
            <div class="distractor-box">
                <div class="distractor-label">⚠️ 忽略文字，按图片分类 ⚠️</div>
                <div class="distractor-text">【 ${trial.distractorText} 】</div>
            </div>
            <div class="timer-bar">
                <div class="timer-fill" id="timerFill" style="width: 100%"></div>
            </div>
            <div class="timer-text" id="timerText">⏱️ ${(trial.timeLimit / 1000).toFixed(1)}秒</div>
            <div class="instruction">🧠 根据图片的真实类别选择分类！</div>
            <div class="category-buttons" id="categoryButtons">
                ${CATEGORIES.map(cat => `
                    <button class="cat-btn" data-category="${cat}">
                        ${CATEGORY_EMOJI[cat]} ${cat}
                    </button>
                `).join('')}
            </div>
        `;
            container.innerHTML = html;

            // 绑定按钮事件
            const btns = document.querySelectorAll('.cat-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (!canRespond || !active) return;
                    const selected = btn.getAttribute('data-category');
                    handleResponse(selected);
                });
            });

            // 启动计时器
            startTimerForTrial(trial.timeLimit);
        }

        function startTimerForTrial(limitMs) {
            if (timerInterval) clearInterval(timerInterval);
            const start = Date.now();
            const fillEl = document.getElementById('timerFill');
            const textEl = document.getElementById('timerText');
            if (!fillEl) return;

            const updateTimer = () => {
                const elapsed = Date.now() - start;
                const remaining = Math.max(0, limitMs - elapsed);
                const percent = (remaining / limitMs) * 100;
                if (fillEl) fillEl.style.width = `${percent}%`;
                if (textEl) textEl.innerText = `⏱️ ${(remaining / 1000).toFixed(1)}秒`;
                if (remaining <= 0 && canRespond) {
                    // 超时未响应，视为错误（无惩罚，温和反馈）
                    clearInterval(timerInterval);
                    if (canRespond && active) {
                        canRespond = false;
                        gameState.totalCount++;
                        updateUIStats();
                        showFeedbackMessage('⏰ 时间到啦~ 下次快一点点！', false);
                        recordTrialAndNext(false, limitMs);
                    }
                }
            };
            updateTimer();
            timerInterval = setInterval(updateTimer, 50);
        }

        async function handleResponse(selectedCategory) {
            if (!canRespond || !active) return;
            const trial = currentTrial;
            const reactionTime = Date.now() - startTime;
            const isCorrect = (selectedCategory === trial.correctCategory);
            const withinTime = reactionTime <= trial.timeLimit;
            const validResponse = isCorrect && withinTime;

            // 停止本次计时
            if (timerInterval) clearInterval(timerInterval);
            canRespond = false;

            // 记录本次尝试
            gameState.totalCount++;
            let earnedCoins = 0;
            let feedbackMsg = '';
            let isGood = false;

            if (validResponse) {
                // 正确：金币奖励 + 言语鼓励（最优组合）
                const baseReward = 10;
                const speedBonus = Math.max(0, Math.floor((trial.timeLimit - reactionTime) / 100));
                earnedCoins = baseReward + speedBonus;
                gameState.coins += earnedCoins;
                gameState.score += earnedCoins;
                gameState.correctCount++;
                isGood = true;
                const randomEnc = ENCOURAGE_MSGS[Math.floor(Math.random() * ENCOURAGE_MSGS.length)];
                feedbackMsg = `${randomEnc} +${earnedCoins}🪙`;
                showFeedbackMessage(feedbackMsg, true);
            } else {
                // 错误：无惩罚，温和反馈
                const gentleMsg = GENTLE_FEEDBACK[Math.floor(Math.random() * GENTLE_FEEDBACK.length)];
                feedbackMsg = gentleMsg;
                showFeedbackMessage(feedbackMsg, false);
            }

            updateUIStats();

            // 记录到历史（用于自适应难度）
            recordTrialHistory(trial, isCorrect, reactionTime, validResponse);

            // 延迟后进入下一试次
            await new Promise(r => setTimeout(r, 800));
            if (active) {
                nextTrial();
            }
        }

        function recordTrialHistory(trial, isCorrect, reactionTime, validResponse) {
            gameState.trialHistory.push({
                timestamp: Date.now(),
                isIncongruent: trial.isIncongruent,
                isCorrect: validResponse,
                reactionTime: reactionTime,
                difficulty: gameState.currentDifficulty
            });
            if (gameState.trialHistory.length > 40) gameState.trialHistory.shift();

            // 自适应难度调整（每5次更新）
            if (gameState.trialHistory.length >= 10 && gameState.trialHistory.length % 5 === 0) {
                adjustDifficultyByPerformance();
            }
        }

        function adjustDifficultyByPerformance() {
            const recent = gameState.trialHistory.slice(-12);
            const incongruentTrials = recent.filter(t => t.isIncongruent === true);
            if (incongruentTrials.length < 5) return;
            const correctIncongruent = incongruentTrials.filter(t => t.isCorrect).length;
            const correctRate = correctIncongruent / incongruentTrials.length;
            let newDiff = gameState.currentDifficulty;

            if (correctRate > 0.75 && gameState.currentDifficulty === 'easy') newDiff = 'medium';
            else if (correctRate > 0.75 && gameState.currentDifficulty === 'medium') newDiff = 'hard';
            else if (correctRate < 0.5 && gameState.currentDifficulty === 'hard') newDiff = 'medium';
            else if (correctRate < 0.45 && gameState.currentDifficulty === 'medium') newDiff = 'easy';

            if (newDiff !== gameState.currentDifficulty) {
                gameState.currentDifficulty = newDiff;
                updateUIStats();
                showFeedbackMessage(`🌟 难度调整：${DIFFICULTY_SETTINGS[newDiff].name}`, true);
            }
        }

        function recordTrialAndNext(isCorrectFlag, reactionMs) {
            if (!active) return;
            if (currentTrial) {
                recordTrialHistory(currentTrial, isCorrectFlag, reactionMs, isCorrectFlag);
            }
            setTimeout(() => {
                if (active) nextTrial();
            }, 600);
        }

        async function nextTrial() {
            if (!active) return;
            if (gameState.totalCount >= 40) {
                endGame();
                return;
            }
            currentTrial = generateTrial();
            startTime = Date.now();
            canRespond = true;
            renderGame();
        }

        function startGame() {
            active = true;
            gameState = {
                score: 0,
                coins: 0,
                correctCount: 0,
                totalCount: 0,
                currentDifficulty: gameState.currentDifficulty, // 保持用户选择的难度
                trialHistory: [],
                waitingNext: false
            };
            updateUIStats();
            currentTrial = generateTrial();
            startTime = Date.now();
            canRespond = true;
            renderGame();
        }

        function endGame() {
            active = false;
            if (timerInterval) clearInterval(timerInterval);
            const accuracy = gameState.totalCount === 0 ? 0 : ((gameState.correctCount / gameState.totalCount) * 100).toFixed(1);
            const incongruentTrials = gameState.trialHistory.filter(t => t.isIncongruent === true);
            const incongAcc = incongruentTrials.length === 0 ? 0 : ((incongruentTrials.filter(t => t.isCorrect).length / incongruentTrials.length) * 100).toFixed(1);
            container.innerHTML = `
            <div class="end-panel">
                <h3>🎉 训练完成 🎉</h3>
                <p>🪙 获得金币: ${gameState.coins}</p>
                <p>⭐ 总分: ${gameState.score}</p>
                <p>🎯 总正确率: ${accuracy}%</p>
                <p>🧠 抑制控制(不一致试次)正确率: ${incongAcc}%</p>
                <p>📚 研究建议: 每周3次，每次20分钟，持续提升注意力</p>
                <button class="restart-btn" id="restartBtn">🔄 新的一轮</button>
                <button class="start-btn" style="margin-top: 12px;" id="backToStartBtn">🏠 返回开始</button>
                <button class="start-btn" style="margin-top: 12px;" id="completeDetectionBtn">✅ 完成检测</button>
            </div>
        `;
            document.getElementById('restartBtn')?.addEventListener('click', () => {
                startGame();
            });
            document.getElementById('backToStartBtn')?.addEventListener('click', () => {
                container.innerHTML = '';
                startScreen.classList.remove('hidden');
            });
            document.getElementById('completeDetectionBtn')?.addEventListener('click', () => {
                // 发送游戏完成事件给父窗口
                if (window.parent) {
                    window.parent.postMessage({
                        type: 'gameCompleted',
                        data: {
                            score: gameState.score,
                            coins: gameState.coins,
                            correctCount: gameState.correctCount,
                            totalCount: gameState.totalCount
                        }
                    }, '*');
                }
            });
        }

        // 初始化游戏
        function initGame() {
            // 游戏已经在页面加载时初始化
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森林动物追踪战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-image: url('../images/ground14.png');
            background-size: cover;
            background-position: center;
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(99, 255, 154, 0.8);
        }

        .header p {
            font-size: 1.1em;
            color: #fff;
            text-shadow: 0 0 10px rgba(118, 255, 125, 0.8);
        }

        .game-area {
            background-image: url('../images/ground13.png');
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 30px #244237;
            margin-bottom: 30px;
            border: 1px solid #244237;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            color: #223B32;
            font-weight: bold;
        }

        .canvas-container {
            width: 500px;
            height: 500px;
            background: transparent;
            border: 5px solid #7DAD86;
            border-radius: 15px;
            position: relative;
            margin: 0 auto 20px;
        }

        canvas {
            background: transparent;
            display: block;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 10px;
        }

        .instructions h2 {
            color: #0f6204;
            margin-bottom: 10px;
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .difficulty-btn {
            padding: 10px 40px;
            border: 2px solid #D9E679;
            background: rgba(255, 255, 255, 0.8);
            color: #D9E679;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .difficulty-btn:hover {
            background: rgba(255, 193, 7, 0.2);
        }

        .difficulty-btn.active {
            background: #D9E679;
            color: #223B32;
        }

        .controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        .btn {
            background: linear-gradient(135deg, #B9D372, #A9CCB4);
            color: white;
            border: none;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px #A9CCB4;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #A9CCB4;
        }

        .btn.hidden {
            display: none;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, #fff, #065514);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn:hover {
            transform: scale(1.1) rotate(10deg);
        }

        /* 游戏结束弹窗 */
        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .game-over-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(135deg, #B9D372, #A9CCB4);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .modal-content h2 {
            color: white;
            font-size: 2em;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .modal-content p {
            color: white;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .modal-btn {
            background: white;
            color: #223B32;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .modal-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='../child-home.html'">←</button>
        <div class="header">
            <h1>森林动物追踪战</h1>
            <p>化身森林小侦探，找到发光的小动物，锻炼注意力分配能力！</p>
        </div>
        <div class="game-area">
            <div class="instructions">
                <h2>游戏说明</h2>
                <ul>
                    <li>游戏开始时，会有几只发光的小动物短暂闪烁，请记住它们的位置</li>
                    <li>移动停止后，点击你记住的发光小动物</li>
                </ul>
            </div>
            <div class="difficulty-selector">
                <button class="difficulty-btn active" id="easyBtn">简单</button>
                <button class="difficulty-btn" id="mediumBtn">中等</button>
                <button class="difficulty-btn" id="hardBtn">困难</button>
            </div>
            <div class="game-info">
                <div>轮次: <span id="roundText">1</span>/3</div>
                <div>得分: <span id="scoreText">0</span></div>
                <div>错误: <span id="errorText">0</span></div>
            </div>
            <div class="canvas-container">
                <canvas id="gameCanvas" width="500" height="500"></canvas>
                <div class="controls">
                    <button class="btn" id="startBtn">开始</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <h2>游戏完成！</h2>
            <p>得分：<span id="finalScore">0</span></p>
            <p>错误：<span id="finalErrors">0</span></p>
            <button class="modal-btn" onclick="resetGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // ===================== 核心稳定游戏逻辑（永不卡死）=====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const roundText = document.getElementById('roundText');
        const scoreText = document.getElementById('scoreText');
        const errorText = document.getElementById('errorText');
        const easyBtn = document.getElementById('easyBtn');
        const mediumBtn = document.getElementById('mediumBtn');
        const hardBtn = document.getElementById('hardBtn');
        const gameOverModal = document.getElementById('gameOverModal');
        const finalScore = document.getElementById('finalScore');
        const finalErrors = document.getElementById('finalErrors');

        // 动物图片路径
        const animalImages = [
            '../images/angela.png',
            '../images/squrriel.png',
            '../images/rabbit.png',
            '../images/hedgehog.png',
            '../images/fox.png',
            '../images/bird.png'
        ];

        // 预加载图片
        const loadedImages = {};
        animalImages.forEach(src => {
            const img = new Image();
            img.src = src;
            loadedImages[src] = img;
        });

        let objects = [];
        let score = 0;
        let errors = 0;
        let round = 1;
        const maxRound = 3;
        let gameState = 'ready'; // ready → highlighting → moving → selecting
        let animationId = null;
        let moveEndTime;
        let totalClick = 0;
        let reactionTimes = [];
        let selectionStartTime = 0;
        let gameStartTime = 0;

        // 难度
        let difficulty = { count: 8, target: 2, speed: 7, moveTime: 3000, highTime: 1500 };
        function setDifficulty(diff) {
            if (diff === 'easy') difficulty = { count: 8, target: 2, speed: 7, moveTime: 3000, highTime: 1500 };
            if (diff === 'medium') difficulty = { count: 10, target: 3, speed: 9, moveTime: 3500, highTime: 1200 };
            if (diff === 'hard') difficulty = { count: 15, target: 4, speed: 12, moveTime: 4000, highTime: 1000 };
            document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
            if (diff === 'easy') easyBtn.classList.add('active');
            if (diff === 'medium') mediumBtn.classList.add('active');
            if (diff === 'hard') hardBtn.classList.add('active');
            reset();
        }
        easyBtn.onclick = () => setDifficulty('easy');
        mediumBtn.onclick = () => setDifficulty('medium');
        hardBtn.onclick = () => setDifficulty('hard');

        // 清空动画
        function clearAnim() {
            if (animationId) cancelAnimationFrame(animationId);
        }

        // 重置
        function reset() {
            clearAnim();
            gameState = 'ready';
            objects = [];
            score = 0;
            errors = 0;
            round = 1;
            totalClick = 0;
            reactionTimes = [];
            selectionStartTime = 0;
            updateUI();
            startBtn.classList.remove('hidden');
            ctx.clearRect(0, 0, 500, 500);
        }

        // 检查两个物体是否重叠
        function checkOverlap(obj1, obj2) {
            return Math.abs(obj1.x - obj2.x) < obj1.size && Math.abs(obj1.y - obj2.y) < obj1.size;
        }

        // 创建物体
        function createObjects() {
            objects = [];
            let total = difficulty.count;
            let targetCount = difficulty.target;
            for (let i = 0; i < total; i++) {
                let attempts = 0;
                let validPosition = false;
                let newObj = null;

                while (!validPosition && attempts < 100) {
                    // 随机选择动物图片
                    const randomImage = animalImages[Math.floor(Math.random() * animalImages.length)];
                    newObj = {
                        x: Math.random() * 400,
                        y: Math.random() * 400,
                        size: 75,
                        vx: (Math.random() - 0.5) * difficulty.speed,
                        vy: (Math.random() - 0.5) * difficulty.speed,
                        isTarget: i < targetCount,
                        selected: false,
                        image: randomImage,
                        animation: 0
                    };

                    // 检查是否与现有物体重叠
                    validPosition = true;
                    for (let j = 0; j < objects.length; j++) {
                        if (checkOverlap(newObj, objects[j])) {
                            validPosition = false;
                            break;
                        }
                    }
                    attempts++;
                }

                if (newObj) {
                    objects.push(newObj);
                }
            }
        }

        // 开始
        startBtn.onclick = () => {
            if (gameState !== 'ready') return;
            clearAnim();
            gameState = 'highlighting';
            startBtn.classList.add('hidden');
            gameStartTime = Date.now(); // 记录游戏开始时间
            createObjects();
            animate();
            setTimeout(() => {
                gameState = 'moving';
                moveEndTime = Date.now() + difficulty.moveTime;
            }, difficulty.highTime);
        };

        // 稳定动画（永不锁死）
        function animate() {
            ctx.clearRect(0, 0, 500, 500);

            // 移动逻辑
            if (gameState === 'moving') {
                objects.forEach(o => {
                    o.x += o.vx;
                    o.y += o.vy;
                    if (o.x < 0 || o.x > 425) o.vx *= -1;
                    if (o.y < 0 || o.y > 425) o.vy *= -1;
                });
                if (Date.now() > moveEndTime) {
                    gameState = 'selecting'; // ✅ 绝对能进入可点击状态
                    selectionStartTime = Date.now(); // 记录选择开始时间
                }
            }

            // 绘制
            objects.forEach(o => {
                // 发光效果
                if (o.isTarget && gameState === 'highlighting') {
                    ctx.shadowColor = '#FFEB3B';
                    ctx.shadowBlur = 20;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 0;
                }

                // 绘制动物图片
                const img = loadedImages[o.image];
                if (img) {
                    ctx.drawImage(img, o.x, o.y, o.size, o.size);
                }

                // 清除阴影
                ctx.shadowBlur = 0;

                // 动画效果 - 闪光效果
                if (o.animation > 0) {
                    o.animation += 0.2;
                    if (o.animation > 1) {
                        o.animation = 0;
                    }
                    // 绘制闪光效果
                    const animationRadius = o.size / 2 + o.animation * 30;
                    const alpha = 1 - o.animation;
                    ctx.strokeStyle = o.isTarget ? `rgba(76, 175, 80, ${alpha})` : `rgba(244, 67, 54, ${alpha})`;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(o.x + o.size / 2, o.y + o.size / 2, animationRadius, 0, Math.PI * 2);
                    ctx.stroke();

                    // 中心闪光
                    const centerRadius = o.animation * 15;
                    ctx.fillStyle = o.isTarget ? `rgba(76, 175, 80, ${alpha})` : `rgba(244, 67, 54, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(o.x + o.size / 2, o.y + o.size / 2, centerRadius, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 选中效果
                if (o.selected) {
                    ctx.strokeStyle = o.isTarget ? "#4CAF50" : "#F44336";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(o.x + o.size / 2, o.y + o.size / 2, o.size / 2, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });

            animationId = requestAnimationFrame(animate);
        }

        // 点击（绝对有效）
        canvas.onclick = (e) => {
            if (gameState !== 'selecting') return;

            // 计算反应时间
            const clickTime = Date.now();
            const reactionTime = clickTime - selectionStartTime;
            reactionTimes.push(reactionTime);
            totalClick++;

            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            // 遍历物体，找到第一个被点击的物体
            for (let i = 0; i < objects.length; i++) {
                const o = objects[i];
                if (o.selected) continue;
                if (mx >= o.x && mx <= o.x + o.size && my >= o.y && my <= o.y + o.size) {
                    o.selected = true;
                    o.animation = 1; // 开始动画
                    if (o.isTarget) score++; else errors++;
                    updateUI();
                    // 找到一个物体后立即返回，确保一次只点击一个物体
                    break;
                }
            }

            // 检查完成
            const allDone = objects.filter(o => o.isTarget).every(o => o.selected);
            if (allDone) {
                // 延迟进入下一轮，让最后一个绿色方框有时间显示
                setTimeout(nextRound, 500);
            }
        };

        // 下一轮（完全干净）
        function nextRound() {
            clearAnim();
            round++;
            if (round > maxRound) {
                // 显示游戏结束弹窗
                showGameOverModal();
                return;
            }
            updateUI();
            // 新一轮
            setTimeout(() => {
                gameState = 'highlighting';
                createObjects();
                animate();
                setTimeout(() => {
                    gameState = 'moving';
                    moveEndTime = Date.now() + difficulty.moveTime;
                }, difficulty.highTime);
            }, 600);
        }

        function calculateTrackingScore() {
            // 计算平均反应时间
            const meanRt = reactionTimes.length > 0 ? reactionTimes.reduce((sum, rt) => sum + rt, 0) / reactionTimes.length : 1000;
            
            // 计算各项指标
            const acc = totalClick > 0 ? score / totalClick : 0;
            const speed = Math.max(0, 1 - (Date.now() - gameStartTime) / 60000);
            const rtScore = Math.max(0, 1 - meanRt / 1000);
            
            // MediaPipe 指标（暂时使用默认值，后续可从实际数据获取）
            const headStable = 0.8; // 头部稳定性
            const faceStable = 0.8; // 面部稳定性
            
            // 计算最终得分
            const scoreValue = (
                acc * 0.35 +
                rtScore * 0.25 +
                speed * 0.20 +
                headStable * 0.12 +
                faceStable * 0.08
            ) * 100;
            
            return Math.max(0, Math.min(100, Math.round(scoreValue)));
        }

        // 显示游戏结束弹窗
        function showGameOverModal() {
            try {
                // 计算视觉追踪得分
                const finalScoreValue = calculateTrackingScore();
                
                // 计算平均反应时间
                const meanRt = reactionTimes.length > 0 ? Math.round(reactionTimes.reduce((sum, rt) => sum + rt, 0) / reactionTimes.length) : 0;
                
                // 显示最终得分和相关数据
                finalScore.textContent = finalScoreValue;
                finalErrors.textContent = errors;
                
                console.log('游戏结束 - 上传到雷达的得分:', finalScoreValue, '正确率:', (score / totalClick * 100).toFixed(1) + '%', '错误:', errors, '总点击:', totalClick, '平均反应时间:', meanRt, 'ms');
                
                // 统计游戏使用时间
                try {
                    if (typeof GameTimeUtil !== 'undefined') {
                        GameTimeUtil.endGame('animal-searching');
                    }
                } catch (e) {
                    console.log('GameTimeUtil 未定义，跳过');
                }
                
                // 上传数据到后端
                uploadTrainingData();
                
                // 显示弹窗
                gameOverModal.classList.add('show');
            } catch (e) {
                console.error('显示游戏结束弹窗失败:', e);
            }
        }

        function uploadTrainingData() {
            try {
                const userInfo = typeof UserStateUtil !== 'undefined' ? UserStateUtil.getUserInfo() : null;
                const childId = typeof UserStateUtil !== 'undefined' ? (UserStateUtil.getCurrentChildId() || userInfo?.currentChildId || 1) : 1;
                let sessionId = null;
                
                // 计算视觉追踪得分
                const finalScore = calculateTrackingScore();
                
                // 计算平均反应时间
                const meanRt = reactionTimes.length > 0 ? Math.round(reactionTimes.reduce((sum, rt) => sum + rt, 0) / reactionTimes.length) : 0;
            
            // 开始训练会话
            fetch(window.API_BASE_URL + '/api/training/session/start', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                },
                body: JSON.stringify({
                    child_id: childId,
                    game_type: 'animal-searching',
                    device_id: 'web'
                })
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    sessionId = result.data.session_id;
                    console.log('训练会话创建成功:', sessionId);
                    
                    // 上传游戏数据
                    return fetch(window.API_BASE_URL + '/api/training/game-data', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                        },
                        body: JSON.stringify({
                            session_id: sessionId,
                            request_id: Date.now().toString(),
                            timestamp: new Date().toISOString(),
                            event_type: 'game_complete',
                            score: finalScore,
                            accuracy: score / totalClick * 100,
                            level: difficulty.level || 1,
                            time: Math.floor((Date.now() - gameStartTime) / 1000),
                            correct: score,
                            error: errors,
                            total_target: score,
                            total_step: totalClick,
                            total_click: totalClick,
                            mean_rt: meanRt
                        })
                    });
                } else {
                    throw new Error(result.message || '创建会话失败');
                }
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    console.log('游戏数据上传成功');
                    
                    // 清除能力评估页面的缓存
                    const cacheKey = `child_data_${childId}`;
                    localStorage.removeItem(cacheKey);
                    console.log('已清除能力评估缓存:', cacheKey);
                    
                    // 结束训练会话
                    return fetch(window.API_BASE_URL + '/api/training/session/end', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                        },
                        body: JSON.stringify({
                            session_id: sessionId,
                            final_score: finalScore,
                            total_accuracy: score / totalClick * 100
                        })
                    });
                } else {
                    throw new Error(result.message || '上传游戏数据失败');
                }
            })
            .then(response => response.json())
            .then(result => {
                console.log('会话结束响应数据:', result);
                if (result.success) {
                    console.log('训练数据上传完成');
                }
            })
            .catch(error => {
                console.error('上传训练数据失败:', error);
            });
            } catch (e) {
                console.error('uploadTrainingData 错误:', e);
            }
        }

        // 重置游戏
        function resetGame() {
            gameOverModal.classList.remove('show');
            reset();
        }

        function updateUI() {
            roundText.textContent = round;
            scoreText.textContent = score;
            errorText.textContent = errors;
        }

        reset();
    </script>
    <script src="../utils.js"></script>
    <script src="../attention-loader.js"></script>
</body>

</html>

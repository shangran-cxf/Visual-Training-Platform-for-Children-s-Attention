<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追太阳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-image: url('../images/ground9.png');
            background-size: cover;
            background-position: center;
            color: #333;
            overflow-y: auto;
            min-height: 100vh;
        }

        .container {
            max-width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            position: relative;
        }


        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #FFC107;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 193, 7, 0.8);
        }

        .header p {
            font-size: 1.1em;
            color: #FFC107;
            text-shadow: 0 0 10px rgba(255, 193, 7, 0.8);
        }

        .header {
            margin-bottom: 50px;
        }

        .game-area {
            background-image: url('../images/ground3.png');
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(64, 166, 255, 0.3);
            margin-bottom: 30px;
            border: 1px solid rgba(85, 176, 255, 0.3);
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .difficulty-btn {
            padding: 10px 40px;
            border: 2px solid #FFC107;
            background-color: rgba(255, 255, 255, 0.8);
            color: #FFC107;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .difficulty-btn:hover {
            background-color: rgba(255, 193, 7, 0.2);
        }

        .difficulty-btn.active {
            background-color: #FFC107;
            color: white;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
            font-size: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            color: #FFC107;
            font-weight: bold;
        }

        .tracking-area {
            width: 500px;
            height: 500px;
            background-color: transparent;
            border: 5px solid rgba(255, 255, 255);
            border-radius: 15px;
            position: relative;
            margin-bottom: 20px;
            cursor: crosshair;
        }

        .target {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-image: url('../images/sun.png');
            background-size: cover;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 26px;
            transition: all 0.3s ease;
        }

        .target.visible {
            display: flex;
        }

        .target.active {
            transform: scale(1.2);
        }

        .controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .btn-start {
            background-color: #FFC107;
            color: white;
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
        }

        .btn-start:hover {
            background-color: #FFB300;
            transform: scale(1.1);
        }

        .btn-start.hidden {
            display: none;
        }

        .feedback {
            text-align: center;
            margin-bottom: 10px;
            padding: 5px 15px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            font-size: 14px;
            color: #FFB300;
            font-weight: bold;
        }

        .literature {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: #666;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
        }

        /* 游戏结束弹窗 */
        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .game-over-modal.show {
            display: flex;
        }

        .game-over-content {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            animation: modalSlideIn 0.5s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .game-over-content h2 {
            color: white;
            font-size: 32px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .modal-btn.restart {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .modal-btn.back {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <div class="container">
        <div style="position: absolute; top: 20px; left: 20px; z-index: 1000;">
            <button onclick="window.location.href='../child-home.html'" style="
                background: linear-gradient(135deg, #FFC107, #FFD54F);
                color: white;
                border: none;
                border-radius: 50%;
                width: 60px;
                height: 60px;
                font-size: 30px;
                cursor: pointer;
                box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
                transition: all 0.3s ease;
                display: flex;
                align-items: center;
                justify-content: center;
            " onmouseover="this.style.transform='scale(1.1) rotate(10deg)'" ;
                onmouseout="this.style.transform='scale(1) rotate(0deg)';">
                ←
            </button>
        </div>

        <div class="header">
            <h1>追太阳</h1>
            <p>跟随移动的太阳，训练视觉追踪能力</p>
        </div>

        <div class="game-area">
            <div class="difficulty-selector">
                <button class="difficulty-btn active" onclick="setDifficulty('easy')">简单</button>
                <button class="difficulty-btn" onclick="setDifficulty('medium')">中等</button>
                <button class="difficulty-btn" onclick="setDifficulty('hard')">困难</button>
            </div>

            <div class="stats">
                <div>得分: <span id="score">0</span></div>
                <div>时间: <span id="time">0</span>s</div>
                <div>错误: <span id="errors">0</span></div>
            </div>

            <div class="feedback" id="feedback">准备就绪，点击开始按钮</div>

            <div class="tracking-area" id="tracking-area">
                <div class="target" id="target">1</div>
                <div class="controls" id="start-controls">
                    <button class="btn-start" id="start-btn" onclick="startGame()">开始</button>
                </div>
            </div>
        </div>

        <div class="literature">
            <p>文献依据：眼动追踪训练研究</p>
        </div>
    </div>

    <script src="../utils.js"></script>
    <script>
        let isGameStarted = false;
        let score = 0;
        let timeElapsed = 0;
        let errorCount = 0;
        let currentTarget = 1;
        let maxTargets = 20;
        let startTime = 0;
        let gameInterval;
        let targetInterval;
        let currentDifficulty = 'easy';
        let totalClick = 0;
        let reactionTimes = [];
        let targetAppearTime = 0;

        const difficultyConfig = {
            easy: { speed: 2000, size: 80 },
            medium: { speed: 1500, size: 70 },
            hard: { speed: 1000, size: 60 }
        };

        const target = document.getElementById('target');
        const trackingArea = document.getElementById('tracking-area');
        const feedback = document.getElementById('feedback');

        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            resetGame();
        }

        function resetGame() {
            isGameStarted = false;
            score = 0;
            timeElapsed = 0;
            errorCount = 0;
            currentTarget = 1;
            totalClick = 0;
            reactionTimes = [];
            targetAppearTime = 0;

            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeElapsed;
            document.getElementById('errors').textContent = errorCount;

            target.classList.remove('visible');
            target.classList.remove('active');
            document.getElementById('start-btn').classList.remove('hidden');
            feedback.textContent = '准备就绪，点击开始按钮';

            clearInterval(gameInterval);
            clearInterval(targetInterval);
        }

        function startGame() {
            if (isGameStarted) return;

            resetGame();
            isGameStarted = true;
            startTime = Date.now();

            document.getElementById('start-btn').classList.add('hidden');
            target.classList.add('visible');
            feedback.textContent = '游戏开始！点击目标';

            moveTarget();

            gameInterval = setInterval(() => {
                timeElapsed = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('time').textContent = timeElapsed;
            }, 1000);

            const config = difficultyConfig[currentDifficulty];
            target.style.width = config.size + 'px';
            target.style.height = config.size + 'px';

            targetInterval = setInterval(() => {
                if (isGameStarted && currentTarget <= maxTargets) {
                    errorCount++;
                    document.getElementById('errors').textContent = errorCount;
                    currentTarget++;
                    if (currentTarget > maxTargets) {
                        endGame();
                    } else {
                        moveTarget();
                    }
                }
            }, config.speed);
        }

        function moveTarget() {
            const config = difficultyConfig[currentDifficulty];
            const maxX = 500 - config.size;
            const maxY = 500 - config.size;

            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.textContent = currentTarget;
            
            // 记录目标出现时间
            targetAppearTime = Date.now();
        }

        function handleTargetClick() {
            if (!isGameStarted) return;

            // 计算反应时间
            const clickTime = Date.now();
            const reactionTime = clickTime - targetAppearTime;
            reactionTimes.push(reactionTime);
            totalClick++;

            score++;
            currentTarget++;
            document.getElementById('score').textContent = score;

            if (currentTarget > maxTargets) {
                endGame();
            } else {
                moveTarget();
                clearInterval(targetInterval);
                const config = difficultyConfig[currentDifficulty];
                targetInterval = setInterval(() => {
                    if (isGameStarted && currentTarget <= maxTargets) {
                        errorCount++;
                        totalClick++;
                        document.getElementById('errors').textContent = errorCount;
                        currentTarget++;
                        if (currentTarget > maxTargets) {
                            endGame();
                        } else {
                            moveTarget();
                        }
                    }
                }, config.speed);
            }
        }

        function endGame() {
            isGameStarted = false;
            clearInterval(gameInterval);
            clearInterval(targetInterval);

            // 统计游戏使用时间
            try {
                if (typeof GameTimeUtil !== 'undefined') {
                    GameTimeUtil.endGame('sun-tracking');
                }
            } catch (e) {
                console.log('GameTimeUtil 未定义，跳过');
            }

            target.classList.remove('visible');
            document.getElementById('start-btn').classList.remove('hidden');
            feedback.textContent = `游戏结束！得分: ${score}, 错误: ${errorCount}`;

            const trainingData = {
                training_type: 'sun-tracking',
                difficulty: currentDifficulty,
                score: score,
                errors: errorCount,
                time: timeElapsed
            };

            if (typeof StorageUtil !== 'undefined') {
                StorageUtil.setItem('training_sun_tracking', trainingData);
            }
            
            // 上传数据到后端
            uploadTrainingData();
            
            // 显示游戏结束弹窗
            showGameOverModal();
        }

        function calculateTrackingScore() {
            // 计算平均反应时间
            const meanRt = reactionTimes.length > 0 ? reactionTimes.reduce((sum, rt) => sum + rt, 0) / reactionTimes.length : 1000;
            
            // 计算各项指标
            const acc = totalClick > 0 ? score / totalClick : 0;
            const speed = Math.max(0, 1 - timeElapsed / 60);
            const rtScore = Math.max(0, 1 - meanRt / 1000);
            
            // MediaPipe 指标（暂时使用默认值，后续可从实际数据获取）
            const headStable = 0.8; // 头部稳定性
            const faceStable = 0.8; // 面部稳定性
            
            // 计算最终得分
            const scoreValue = (
                acc * 0.35 +
                rtScore * 0.25 +
                speed * 0.20 +
                headStable * 0.12 +
                faceStable * 0.08
            ) * 100;
            
            return Math.max(0, Math.min(100, Math.round(scoreValue)));
        }

        function showGameOverModal() {
            try {
                // 计算视觉追踪得分
                const finalScore = calculateTrackingScore();
                
                // 计算平均反应时间
                const meanRt = reactionTimes.length > 0 ? Math.round(reactionTimes.reduce((sum, rt) => sum + rt, 0) / reactionTimes.length) : 0;
                
                console.log('游戏结束 - 得分:', finalScore, '用时:', timeElapsed, '正确:', score, '错误:', errorCount, '总点击:', totalClick, '平均反应时间:', meanRt, 'ms');
                
                // 填充数据
                document.getElementById('modal-score').textContent = finalScore;
                document.getElementById('modal-time').textContent = timeElapsed + 's';
                document.getElementById('modal-correct').textContent = score;
                document.getElementById('modal-errors').textContent = errorCount;
                
                // 显示弹窗
                const modal = document.getElementById('gameOverModal');
                modal.classList.add('show');
                modal.style.display = 'flex';
            } catch (e) {
                console.error('显示游戏结束弹窗失败:', e);
            }
        }

        function restartGame() {
            // 隐藏弹窗
            const modal = document.getElementById('gameOverModal');
            modal.classList.remove('show');
            modal.style.display = 'none';
            
            // 重新开始游戏
            resetGame();
            setTimeout(() => {
                startGame();
            }, 500);
        }

        function backToStart() {
            // 隐藏弹窗
            const modal = document.getElementById('gameOverModal');
            modal.classList.remove('show');
            modal.style.display = 'none';
            
            // 返回到开始状态
            resetGame();
        }

        function uploadTrainingData() {
            try {
                const userInfo = typeof UserStateUtil !== 'undefined' ? UserStateUtil.getUserInfo() : null;
                const childId = typeof UserStateUtil !== 'undefined' ? (UserStateUtil.getCurrentChildId() || userInfo?.currentChildId || 1) : 1;
                let sessionId = null;
                
                // 计算视觉追踪得分
                const finalScore = calculateTrackingScore();
                
                // 计算平均反应时间
                const meanRt = reactionTimes.length > 0 ? Math.round(reactionTimes.reduce((sum, rt) => sum + rt, 0) / reactionTimes.length) : 0;
            
            // 开始训练会话
            fetch('http://localhost:5000/api/training/session/start', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                },
                body: JSON.stringify({
                    child_id: childId,
                    game_type: 'sun-tracking',
                    device_id: 'web'
                })
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    sessionId = result.data.session_id;
                    console.log('训练会话创建成功:', sessionId);
                    
                    // 上传游戏数据
                    return fetch('http://localhost:5000/api/training/game-data', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                        },
                        body: JSON.stringify({
                            session_id: sessionId,
                            request_id: Date.now().toString(),
                            timestamp: new Date().toISOString(),
                            event_type: 'game_complete',
                            score: finalScore,
                            accuracy: score / totalClick * 100,
                            level: currentDifficulty,
                            time: timeElapsed,
                            correct: score,
                            error: errorCount,
                            total_target: maxTargets,
                            total_step: totalClick,
                            total_click: totalClick,
                            mean_rt: meanRt
                        })
                    });
                } else {
                    throw new Error(result.message || '创建会话失败');
                }
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    console.log('游戏数据上传成功');
                    
                    // 清除能力评估页面的缓存
                    const cacheKey = `child_data_${childId}`;
                    localStorage.removeItem(cacheKey);
                    console.log('已清除能力评估缓存:', cacheKey);
                    
                    // 结束训练会话
                    const accuracy = totalClick > 0 ? score / totalClick * 100 : 0;
                    return fetch('http://localhost:5000/api/training/session/end', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                        },
                        body: JSON.stringify({
                            session_id: sessionId,
                            final_score: finalScore,
                            total_accuracy: accuracy
                        })
                    });
                } else {
                    throw new Error(result.message || '上传游戏数据失败');
                }
            })
            .then(response => response.json())
            .then(result => {
                console.log('会话结束响应数据:', result);
                if (result.success) {
                    console.log('训练数据上传完成');
                }
            })
            .catch(error => {
                console.error('上传训练数据失败:', error);
            });
            } catch (e) {
                console.error('uploadTrainingData 错误:', e);
            }
        }

        target.addEventListener('click', handleTargetClick);
    </script>
    
    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="game-over-content">
            <h2>🎉 游戏完成！🎉</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">🏆 得分</div>
                    <div class="stat-value" id="modal-score" style="color: #ff9800; font-size: 36px;">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">⏱️ 用时</div>
                    <div class="stat-value" id="modal-time">0s</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">✅ 正确</div>
                    <div class="stat-value" id="modal-correct">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">❌ 错误</div>
                    <div class="stat-value" id="modal-errors">0</div>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn restart" onclick="restartGame()">🔄 再来一局</button>
                <button class="modal-btn back" onclick="backToStart()">🏠 返回开始</button>
            </div>
        </div>
    </div>
    
    <script src="../attention-loader.js"></script>

</body>

</html>

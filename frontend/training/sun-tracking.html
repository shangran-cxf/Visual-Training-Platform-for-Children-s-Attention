<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>追太阳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-image: url('../images/ground9.png');
            background-size: cover;
            background-position: center;
            color: #333;
            overflow-y: auto;
            min-height: 100vh;
        }

        .container {
            max-width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            position: relative;
        }


        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #FFC107;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 193, 7, 0.8);
        }

        .header p {
            font-size: 1.1em;
            color: #FFC107;
            text-shadow: 0 0 10px rgba(255, 193, 7, 0.8);
        }

        .header {
            margin-bottom: 50px;
        }

        .game-area {
            background-image: url('../images/ground3.png');
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(64, 166, 255, 0.3);
            margin-bottom: 30px;
            border: 1px solid rgba(85, 176, 255, 0.3);
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .difficulty-btn {
            padding: 10px 40px;
            border: 2px solid #FFC107;
            background-color: rgba(255, 255, 255, 0.8);
            color: #FFC107;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .difficulty-btn:hover {
            background-color: rgba(255, 193, 7, 0.2);
        }

        .difficulty-btn.active {
            background-color: #FFC107;
            color: white;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
            font-size: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            color: #FFC107;
            font-weight: bold;
        }

        .tracking-area {
            width: 500px;
            height: 500px;
            background-color: transparent;
            border: 5px solid rgba(255, 255, 255);
            border-radius: 15px;
            position: relative;
            margin-bottom: 20px;
            cursor: crosshair;
        }

        .target {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-image: url('../images/sun.png');
            background-size: cover;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 26px;
            transition: all 0.3s ease;
        }

        .target.visible {
            display: flex;
        }

        .target.active {
            transform: scale(1.2);
        }

        .controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .btn-start {
            background-color: #FFC107;
            color: white;
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
        }

        .btn-start:hover {
            background-color: #FFB300;
            transform: scale(1.1);
        }

        .btn-start.hidden {
            display: none;
        }

        .feedback {
            text-align: center;
            margin-bottom: 10px;
            padding: 5px 15px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            font-size: 14px;
            color: #FFB300;
            font-weight: bold;
        }

        .literature {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: #666;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div style="position: absolute; top: 20px; left: 20px; z-index: 1000;">
            <button onclick="window.location.href='../child-home.html'" style="
                background: linear-gradient(135deg, #FFC107, #FFD54F);
                color: white;
                border: none;
                border-radius: 50%;
                width: 60px;
                height: 60px;
                font-size: 30px;
                cursor: pointer;
                box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
                transition: all 0.3s ease;
                display: flex;
                align-items: center;
                justify-content: center;
            " onmouseover="this.style.transform='scale(1.1) rotate(10deg)'" ;
                onmouseout="this.style.transform='scale(1) rotate(0deg)';">
                ←
            </button>
        </div>

        <div class="header">
            <h1>追太阳</h1>
            <p>跟随移动的太阳，训练视觉追踪能力</p>
        </div>

        <div class="game-area">
            <div class="difficulty-selector">
                <button class="difficulty-btn active" onclick="setDifficulty('easy')">简单</button>
                <button class="difficulty-btn" onclick="setDifficulty('medium')">中等</button>
                <button class="difficulty-btn" onclick="setDifficulty('hard')">困难</button>
            </div>

            <div class="stats">
                <div>得分: <span id="score">0</span></div>
                <div>时间: <span id="time">0</span>s</div>
                <div>错误: <span id="errors">0</span></div>
            </div>

            <div class="feedback" id="feedback">准备就绪，点击开始按钮</div>

            <div class="tracking-area" id="tracking-area">
                <div class="target" id="target">1</div>
                <div class="controls" id="start-controls">
                    <button class="btn-start" id="start-btn" onclick="startGame()">开始</button>
                </div>
            </div>
        </div>

        <div class="literature">
            <p>文献依据：眼动追踪训练研究</p>
        </div>
    </div>

    <script src="../utils.js"></script>
    <script>
        let isGameStarted = false;
        let score = 0;
        let timeElapsed = 0;
        let errorCount = 0;
        let currentTarget = 1;
        let maxTargets = 20;
        let startTime = 0;
        let gameInterval;
        let targetInterval;
        let currentDifficulty = 'easy';

        const difficultyConfig = {
            easy: { speed: 2000, size: 80 },
            medium: { speed: 1500, size: 70 },
            hard: { speed: 1000, size: 60 }
        };

        const target = document.getElementById('target');
        const trackingArea = document.getElementById('tracking-area');
        const feedback = document.getElementById('feedback');

        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            resetGame();
        }

        function resetGame() {
            isGameStarted = false;
            score = 0;
            timeElapsed = 0;
            errorCount = 0;
            currentTarget = 1;

            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeElapsed;
            document.getElementById('errors').textContent = errorCount;

            target.classList.remove('visible');
            target.classList.remove('active');
            document.getElementById('start-btn').classList.remove('hidden');
            feedback.textContent = '准备就绪，点击开始按钮';

            clearInterval(gameInterval);
            clearInterval(targetInterval);
        }

        function startGame() {
            if (isGameStarted) return;

            resetGame();
            isGameStarted = true;
            startTime = Date.now();

            document.getElementById('start-btn').classList.add('hidden');
            target.classList.add('visible');
            feedback.textContent = '游戏开始！点击目标';

            moveTarget();

            gameInterval = setInterval(() => {
                timeElapsed = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('time').textContent = timeElapsed;
            }, 1000);

            const config = difficultyConfig[currentDifficulty];
            target.style.width = config.size + 'px';
            target.style.height = config.size + 'px';

            targetInterval = setInterval(() => {
                if (isGameStarted && currentTarget <= maxTargets) {
                    errorCount++;
                    document.getElementById('errors').textContent = errorCount;
                    currentTarget++;
                    if (currentTarget > maxTargets) {
                        endGame();
                    } else {
                        moveTarget();
                    }
                }
            }, config.speed);
        }

        function moveTarget() {
            const config = difficultyConfig[currentDifficulty];
            const maxX = 500 - config.size;
            const maxY = 500 - config.size;

            const x = Math.random() * maxX;
            const y = Math.random() * maxY;

            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.textContent = currentTarget;
        }

        function handleTargetClick() {
            if (!isGameStarted) return;

            score++;
            currentTarget++;
            document.getElementById('score').textContent = score;

            if (currentTarget > maxTargets) {
                endGame();
            } else {
                moveTarget();
                clearInterval(targetInterval);
                const config = difficultyConfig[currentDifficulty];
                targetInterval = setInterval(() => {
                    if (isGameStarted && currentTarget <= maxTargets) {
                        errorCount++;
                        document.getElementById('errors').textContent = errorCount;
                        currentTarget++;
                        if (currentTarget > maxTargets) {
                            endGame();
                        } else {
                            moveTarget();
                        }
                    }
                }, config.speed);
            }
        }

        function endGame() {
            isGameStarted = false;
            clearInterval(gameInterval);
            clearInterval(targetInterval);

            // 统计游戏使用时间
            GameTimeUtil.endGame('sun-tracking');

            target.classList.remove('visible');
            document.getElementById('start-btn').classList.remove('hidden');
            feedback.textContent = `游戏结束！得分: ${score}, 错误: ${errorCount}`;

            const trainingData = {
                training_type: 'sun-tracking',
                difficulty: currentDifficulty,
                score: score,
                errors: errorCount,
                time: timeElapsed
            };

            if (typeof StorageUtil !== 'undefined') {
                StorageUtil.setItem('training_sun_tracking', trainingData);
            }
        }

        target.addEventListener('click', handleTargetClick);
    </script>
    
    <script src="../attention-loader.js"></script>

</body>

</html>

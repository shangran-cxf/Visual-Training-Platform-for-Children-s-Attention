<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关卡1：线索筛选站 - 注意力全能小侦探</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-image: url('../images/ground1.png');
            background-size: cover;
            background-position: center;
            color: #333;
            overflow: hidden;
        }

        .container {
            max-width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 2.2em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .header p {
            font-size: 1.2em;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .game-area {
            width: 800px;
            height: 500px;
            background-color: transparent;
            border-radius: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .clue {
            width: 110px;
            height: 110px;
            margin: 12px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            font-size: 44px;
            background-color: transparent;
            border: none;
        }

        .clue:hover {
            transform: scale(1.1);
        }

        .clue.selected {
            animation: correctBounce 0.6s ease;
        }

        .clue.selected.distractor {
            animation: wrongShake 0.5s ease;
        }

        @keyframes correctBounce {
            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.2) rotate(-5deg);
            }

            50% {
                transform: scale(1.3) rotate(5deg);
            }

            75% {
                transform: scale(1.2) rotate(-3deg);
            }

            100% {
                transform: scale(1.1) rotate(0deg);
            }
        }

        @keyframes wrongShake {

            0%,
            100% {
                transform: translateX(0) scale(1);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-8px) rotate(-5deg);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(8px) rotate(5deg);
            }
        }

        .clue img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.2));
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #45a049;
        }

        .btn-secondary {
            background-color: #999;
        }

        .btn-secondary:hover {
            background-color: #777;
        }

        .timer {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.95);
            padding: 50px 60px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            display: none;
            z-index: 9999;
            min-width: 400px;
            border: 3px solid #4CAF50;
        }

        .feedback h3 {
            color: #4CAF50;
            margin-bottom: 25px;
            font-size: 32px;
        }

        .feedback p {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
        }

        .feedback .btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 可爱的返回按钮 -->
        <div style="position: absolute; top: 20px; left: 20px; z-index: 1000;">
            <button onclick="window.location.href='index.html'" style="
                background: linear-gradient(135deg, #4caf50, #81c784);
                color: white;
                border: none;
                border-radius: 50%;
                width: 60px;
                height: 60px;
                font-size: 24px;
                cursor: pointer;
                box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
                transition: all 0.3s ease;
                display: flex;
                align-items: center;
                justify-content: center;
                animation: bounce 2s ease-in-out infinite alternate;
            " onmouseover="this.style.transform='scale(1.1) rotate(10deg)';"
                onmouseout="this.style.transform='scale(1) rotate(0deg)';">
                ←
            </button>
        </div>
        <div class="header">
            <h1>关卡1：线索筛选站</h1>
            <p>请快速点击选出所有目标线索：<span id="target-clue-display">⭐</span></p>
        </div>
        <div class="game-area">
            <div class="timer">时间：0s</div>
            <div class="feedback" id="feedback">
                <h3>关卡完成！</h3>
                <p>正确率：<span id="accuracy">0%</span></p>
                <p>完成时间：<span id="time">0</span>s</p>
                <p>误点次数：<span id="errors">0</span></p>
                <button class="btn" onclick="nextLevel()">下一关</button>
            </div>
        </div>

    </div>
    <script src="../utils.js"></script>
    <script>
        let clues = [];
        let targetClues = [];
        let selectedClues = [];
        let startTime = 0;
        let endTime = 0;
        let isGameStarted = false;
        let isPaused = false;
        let errorCount = 0;

        // 生成线索
        function generateClues() {
            const gameArea = document.querySelector('.game-area');
            gameArea.innerHTML = '<div class="timer">时间：0s</div><div class="feedback" id="feedback"><h3>关卡完成！</h3><p>正确率：<span id="accuracy">0%</span></p><p>完成时间：<span id="time">0</span>s</p><p>误点次数：<span id="errors">0</span></p><button class="btn" onclick="nextLevel()">下一关</button></div>';

            clues = [];
            targetClues = [];
            selectedClues = [];
            errorCount = 0;

            // 定义可能的目标线索（使用图片）
            const possibleTargets = [
                { type: 'image', src: '../images/star.png' },
                { type: 'image', src: '../images/crayon.png' },
                { type: 'image', src: '../images/sun.png' },
                { type: 'image', src: '../images/rainbow.png' },
                { type: 'image', src: '../images/flower.png' }
            ];

            // 随机选择一个目标线索
            const targetClue = possibleTargets[Math.floor(Math.random() * possibleTargets.length)];

            // 随机生成目标方格数量（3-5个）
            const targetCount = Math.floor(Math.random() * 3) + 3;

            // 随机生成总线索数量（10-15个）
            const totalClues = Math.floor(Math.random() * 6) + 10;
            const distractorCount = totalClues - targetCount;

            // 更新目标线索显示
            const targetClueDisplay = document.getElementById('target-clue-display');
            if (targetClue.type === 'image') {
                targetClueDisplay.innerHTML = `<img src="${targetClue.src}" style="width: 30px; height: 30px; vertical-align: middle;">`;
            } else {
                targetClueDisplay.textContent = targetClue.value;
            }

            // 生成目标线索
            for (let i = 0; i < targetCount; i++) {
                const clue = document.createElement('div');
                clue.className = 'clue';
                clue.dataset.type = 'target';
                clue.dataset.index = i;
                clue.addEventListener('click', () => selectClue(clue));

                // 根据线索类型设置内容
                if (targetClue.type === 'image') {
                    const img = document.createElement('img');
                    img.src = targetClue.src;
                    img.style.width = '80%';
                    img.style.height = '80%';
                    clue.appendChild(img);
                } else {
                    clue.textContent = targetClue.value;
                }

                gameArea.appendChild(clue);
                clues.push(clue);
                targetClues.push(clue);
            }

            // 生成干扰线索
            const distractors = possibleTargets.filter(item => item !== targetClue);
            for (let i = 0; i < distractorCount; i++) {
                const distractor = distractors[Math.floor(Math.random() * distractors.length)];
                const clue = document.createElement('div');
                clue.className = 'clue';
                clue.dataset.type = 'distractor';
                clue.dataset.index = targetCount + i;
                clue.addEventListener('click', () => selectClue(clue));

                // 根据线索类型设置内容
                if (distractor.type === 'image') {
                    const img = document.createElement('img');
                    img.src = distractor.src;
                    img.style.width = '80%';
                    img.style.height = '80%';
                    clue.appendChild(img);
                } else {
                    clue.textContent = distractor.value;
                }

                gameArea.appendChild(clue);
                clues.push(clue);
            }

            // 随机打乱线索顺序
            shuffleClues();
        }

        // 打乱线索顺序
        function shuffleClues() {
            const gameArea = document.querySelector('.game-area');
            const cluesContainer = Array.from(gameArea.querySelectorAll('.clue'));
            cluesContainer.sort(() => Math.random() - 0.5);
            cluesContainer.forEach(clue => gameArea.appendChild(clue));
        }

        // 选择线索
        function selectClue(clue) {
            if (!isGameStarted || isPaused) return;

            if (clue.classList.contains('selected')) {
                // 取消选择
                clue.classList.remove('selected');
                const index = selectedClues.indexOf(clue.dataset.index);
                if (index > -1) {
                    selectedClues.splice(index, 1);
                }
            } else {
                // 选择
                clue.classList.add('selected');
                selectedClues.push(clue.dataset.index);

                // 记录误点并添加错误标记
                if (clue.dataset.type === 'distractor') {
                    errorCount++;
                    clue.classList.add('distractor');
                    showFeedbackEffect(clue, '❌', '#f44336');
                } else {
                    // 正确选择，显示金色星星
                    showFeedbackEffect(clue, '⭐', '#FFD700');
                }
            }

            // 检查是否完成
            checkCompletion();
        }

        // 显示反馈特效
        function showFeedbackEffect(element, emoji, color) {
            const effect = document.createElement('div');
            effect.textContent = emoji;
            effect.style.cssText = `
                position: absolute;
                font-size: 24px;
                pointer-events: none;
                z-index: 100;
                animation: feedbackPop 0.8s ease forwards;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                opacity: 0.7;
            `;
            element.style.position = 'relative';
            element.appendChild(effect);

            setTimeout(() => {
                if (effect.parentNode) {
                    effect.remove();
                }
            }, 800);
        }

        // 添加反馈动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes feedbackPop {
                0% { 
                    transform: translate(-50%, -50%) scale(0) rotate(0deg); 
                    opacity: 1;
                }
                50% { 
                    transform: translate(-50%, -80%) scale(1.5) rotate(180deg); 
                    opacity: 1;
                }
                100% { 
                    transform: translate(-50%, -120%) scale(1) rotate(360deg); 
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // 检查是否完成
        function checkCompletion() {
            const selectedTargetClues = selectedClues.filter(index => {
                const clue = document.querySelector(`[data-index="${index}"]`);
                return clue && clue.dataset.type === 'target';
            });

            if (selectedTargetClues.length === targetClues.length) {
                endGame();
            }
        }

        // 开始游戏
        function startGame() {
            if (isGameStarted) return;

            generateClues();
            isGameStarted = true;
            isPaused = false;
            startTime = Date.now();
            updateTimer();
        }

        // 暂停游戏
        function pauseGame() {
            if (!isGameStarted) return;

            isPaused = !isPaused;
            if (!isPaused) {
                startTime = Date.now() - (endTime - startTime);
                updateTimer();
            }
        }

        // 更新计时器
        function updateTimer() {
            if (!isGameStarted || isPaused) return;

            const currentTime = Math.floor((Date.now() - startTime) / 1000);
            document.querySelector('.timer').textContent = `时间：${currentTime}s`;
            requestAnimationFrame(updateTimer);
        }

        // 结束游戏
        function endGame() {
            isGameStarted = false;
            endTime = Date.now();

            // 计算结果
            const totalTime = Math.floor((endTime - startTime) / 1000);
            const correctTargets = selectedClues.filter(index => {
                const clue = document.querySelector(`[data-index="${index}"]`);
                return clue && clue.dataset.type === 'target';
            }).length;
            const accuracy = Math.round((correctTargets / targetClues.length) * 100);

            // 显示反馈
            document.getElementById('accuracy').textContent = `${accuracy}%`;
            document.getElementById('time').textContent = totalTime;
            document.getElementById('errors').textContent = errorCount;
            document.getElementById('feedback').style.display = 'block';

            // 保存数据
            const data = {
                selective_attention: accuracy,
                completion_time: totalTime,
                error_count: errorCount
            };
            StorageUtil.setItem('level1_data', data);
        }

        // 下一关
        function nextLevel() {
            window.location.href = 'level2.html';
        }

        // 页面加载时生成线索并自动开始游戏
        window.onload = function () {
            generateClues();
            startGame();
        };
    </script>
    <!-- 专注力检测模块 -->
    <script src="../attention-loader.js"></script>
</body>

</html>

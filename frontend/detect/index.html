<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合检测 - 注意力全能小侦探</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-image: url('../images/ground11.png');
            background-size: cover;
            background-position: center;
            color: #333;
        }

        .container {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .levels {
            width: 100%;
            max-width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            color: #4CAF50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            color: #666;
        }

        .levels {
            display: flex;
            flex-direction: row;
            gap: 30px;
            flex: 1;
            overflow: visible;
            padding: 20px;
        }

        .level-card {
            border-radius: 50px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.15);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border 0.3s ease;
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 2px solid white;
            border-style: solid;
            position: relative;
            overflow: hidden;
            min-height: 300px;
        }

        .level-card:nth-child(1) {
            background: #ff7741;
        }

        .level-card:nth-child(1) h3,
        .level-card:nth-child(1) p {
            color: white;
        }

        .level-card:nth-child(2) {
            background: #21beda;
        }

        .level-card:nth-child(2) h3,
        .level-card:nth-child(2) p {
            color: white;
        }

        .level-card:nth-child(3) {
            background: #7eb11f;
        }

        .level-card:nth-child(3) h3,
        .level-card:nth-child(3) p {
            color: white;
        }

        .level-card:nth-child(4) {
            background: #835fc3;
        }

        .level-card:nth-child(4) h3,
        .level-card:nth-child(4) p {
            color: white;
        }

        .level-card:nth-child(5) {
            background: #ffabda;
        }

        .level-card:nth-child(5) h3,
        .level-card:nth-child(5) p {
            color: white;
        }

        .level-card>* {
            position: relative;
            z-index: 2;
        }

        .level-card::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 1px dashed #81c784;
            border-radius: 60px;
            z-index: 1;
            animation: border-dance 3s ease-in-out infinite;
        }

        .level-card:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
        }

        .level-card:nth-child(1):hover {
            box-shadow: 0 12px 25px rgba(255, 107, 107, 0.3);
            border-color: white;
        }

        .level-card:nth-child(2):hover {
            box-shadow: 0 12px 25px rgba(107, 107, 255, 0.3);
            border-color: white;
        }

        .level-card:nth-child(3):hover {
            box-shadow: 0 12px 25px rgba(107, 255, 107, 0.3);
            border-color: white;
        }

        .level-card:nth-child(4):hover {
            box-shadow: 0 12px 25px rgba(255, 107, 255, 0.3);
            border-color: white;
        }

        .level-card:nth-child(5):hover {
            box-shadow: 0 12px 25px rgba(255, 255, 107, 0.3);
            border-color: white;
        }

        .level-card:nth-child(1)::before {
            animation: border-dance-1 3s ease-in-out infinite;
        }

        .level-card:nth-child(2)::before {
            animation: border-dance-2 3s ease-in-out infinite;
        }

        .level-card:nth-child(3)::before {
            animation: border-dance-3 3s ease-in-out infinite;
        }

        .level-card:nth-child(4)::before {
            animation: border-dance-4 3s ease-in-out infinite;
        }

        .level-card:nth-child(5)::before {
            animation: border-dance-5 3s ease-in-out infinite;
        }

        @keyframes border-dance-1 {
            0% {
                border-color: #ff6b6b;
            }

            25% {
                border-color: #ff8787;
            }

            50% {
                border-color: #ffa5a5;
            }

            75% {
                border-color: #ff8787;
            }

            100% {
                border-color: #ff6b6b;
            }
        }

        @keyframes border-dance-2 {
            0% {
                border-color: #6b6bff;
            }

            25% {
                border-color: #8787ff;
            }

            50% {
                border-color: #a5a5ff;
            }

            75% {
                border-color: #8787ff;
            }

            100% {
                border-color: #6b6bff;
            }
        }

        @keyframes border-dance-3 {
            0% {
                border-color: #6bff6b;
            }

            25% {
                border-color: #87ff87;
            }

            50% {
                border-color: #a5ffa5;
            }

            75% {
                border-color: #87ff87;
            }

            100% {
                border-color: #6bff6b;
            }
        }

        @keyframes border-dance-4 {
            0% {
                border-color: #ff6bff;
            }

            25% {
                border-color: #ff87ff;
            }

            50% {
                border-color: #ffa5ff;
            }

            75% {
                border-color: #ff87ff;
            }

            100% {
                border-color: #ff6bff;
            }
        }

        @keyframes border-dance-5 {
            0% {
                border-color: #ffff6b;
            }

            25% {
                border-color: #ffff87;
            }

            50% {
                border-color: #ffffa5;
            }

            75% {
                border-color: #ffff87;
            }

            100% {
                border-color: #ffff6b;
            }
        }

        .level-number {
            margin-bottom: 15px;
            margin-top: 10px;
        }

        .level-number img {
            width: 90px;
            height: 90px;
            object-fit: contain;
        }

        .level-card h3 {
            color: #4CAF50;
            margin-bottom: 12px;
            font-size: 1.6em;
            font-weight: bold;
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', sans-serif;
        }

        .level-card p {
            color: #666;
            margin-bottom: 15px;
            font-size: 1em;
            line-height: 1.3;
            flex: 1;
        }

        .btn-start {
            border: none;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            align-self: center;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -10px;
        }

        .level-card:nth-child(1) .btn-start {
            background: white;
            color: #ff9800;
        }

        .level-card:nth-child(2) .btn-start {
            background: white;
            color: #21beda;
        }

        .level-card:nth-child(3) .btn-start {
            background: white;
            color: #a5e729;
        }

        .level-card:nth-child(4) .btn-start {
            background: white;
            color: #b259c9;
        }

        .level-card:nth-child(5) .btn-start {
            background: white;
            color: #ff80c8;
        }

        .level-card:nth-child(1) .btn-start:hover {
            background: #f5f5f5;
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(255, 152, 0, 0.4);
        }

        .level-card:nth-child(2) .btn-start:hover {
            background: #f5f5f5;
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(33, 190, 218, 0.4);
        }

        .level-card:nth-child(3) .btn-start:hover {
            background: #f5f5f5;
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(165, 231, 41, 0.4);
        }

        .level-card:nth-child(4) .btn-start:hover {
            background: #f5f5f5;
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(178, 89, 201, 0.4);
        }

        .level-card:nth-child(5) .btn-start:hover {
            background: #f5f5f5;
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(255, 128, 200, 0.4);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 可爱的返回按钮 -->
        <div style="position: absolute; top: 20px; left: 20px; z-index: 1000;">
            <button onclick="window.location.href='../child-home.html'" style="
                background: linear-gradient(135deg, #4caf50, #81c784);
                color: white;
                border: none;
                border-radius: 50%;
                width: 60px;
                height: 60px;
                font-size: 24px;
                cursor: pointer;
                box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
                transition: all 0.3s ease;
                display: flex;
                align-items: center;
                justify-content: center;
                animation: bounce 2s ease-in-out infinite alternate;
            " onmouseover="this.style.transform='scale(1.1) rotate(10deg)';"
                onmouseout="this.style.transform='scale(1) rotate(0deg)';">
                ←
            </button>
        </div>
        <div class="header">
            <h1>注意力全能小侦探</h1>
            <p>完成以下5大关卡，检测你的注意力水平！</p>
        </div>
        <div class="levels">
            <div class="level-card">
                <div class="level-number">
                    <img src="../images/序号1.png" alt="关卡1">
                </div>
                <h3>线索筛选站</h3>
                <p>测试选择性注意能力，快速找出目标线索</p>
                <button class="btn-start" onclick="startLevel(1)">开始</button>
            </div>
            <div class="level-card">
                <div class="level-number">
                    <img src="../images/序号2.png" alt="关卡2">
                </div>
                <h3>监控摄像头</h3>
                <p>测试持续性注意能力，识别小偷</p>
                <button class="btn-start" onclick="startLevel(2)">开始</button>
            </div>
            <div class="level-card">
                <div class="level-number">
                    <img src="../images/序号3.png" alt="关卡3">
                </div>
                <h3>追踪嫌疑人</h3>
                <p>测试视觉追踪能力，跟随嫌疑人移动</p>
                <button class="btn-start" onclick="startLevel(3)">开始</button>
            </div>
            <div class="level-card">
                <div class="level-number">
                    <img src="../images/序号4.png" alt="关卡4">
                </div>
                <h3>记忆线索库</h3>
                <p>测试工作记忆能力，按顺序点击图标</p>
                <button class="btn-start" onclick="startLevel(4)">开始</button>
            </div>
            <div class="level-card">
                <div class="level-number">
                    <img src="../images/序号5.png" alt="关卡5">
                </div>
                <h3>红绿灯指令</h3>
                <p>测试抑制控制能力，执行正确指令</p>
                <button class="btn-start" onclick="startLevel(5)">开始</button>
            </div>
        </div>
        <div class="footer">
            <p>© 2026 注意力训练平台</p>
        </div>
    </div>
    <script>
        function startLevel(level) {
            // 跳转到对应关卡页面
            window.location.href = `level${level}.html`;
        }
    </script>
</body>

</html>

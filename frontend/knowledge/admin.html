<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识内容管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .tags-input {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .tag {
            background: #4CAF50;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tag button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }

        .btn:hover {
            background: #45a049;
        }

        .btn-secondary {
            background: #2196F3;
        }

        .btn-secondary:hover {
            background: #1976D2;
        }

        .btn-danger {
            background: #f44336;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .actions {
            text-align: center;
            margin-top: 20px;
        }

        .articles-list {
            margin-top: 30px;
        }

        .article-item {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
            background: #fafafa;
        }

        .article-actions {
            margin-top: 10px;
            text-align: right;
        }

        .notification {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .notification.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .notification.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>知识内容管理系统</h1>
        
        <div id="notification" class="notification"></div>
        
        <form id="articleForm">
            <div class="form-group">
                <label for="title">标题 *</label>
                <input type="text" id="title" required>
            </div>
            
            <div class="form-group">
                <label for="content">内容 *</label>
                <textarea id="content" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="author">作者</label>
                <input type="text" id="author" value="专业团队">
            </div>
            
            <div class="form-group">
                <label for="date">日期 (YYYY-MM-DD)</label>
                <input type="date" id="date">
            </div>
            
            <div class="form-group">
                <label for="category">分类</label>
                <select id="category">
                    <option value="发展心理学">发展心理学</option>
                    <option value="训练方法">训练方法</option>
                    <option value="家庭教育">家庭教育</option>
                    <option value="注意力类型">注意力类型</option>
                    <option value="感知训练">感知训练</option>
                    <option value="认知能力">认知能力</option>
                    <option value="自控能力">自控能力</option>
                    <option value="学习关联">学习关联</option>
                    <option value="现代挑战">现代挑战</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="tags">标签 (用逗号分隔)</label>
                <input type="text" id="tags" placeholder="例如: 注意力, 儿童发展, 关键期">
                <div id="tagsDisplay" class="tags-input"></div>
            </div>
            
            <div class="form-group">
                <label for="summary">摘要</label>
                <input type="text" id="summary" placeholder="文章摘要，简要概述文章主要内容">
            </div>
            
            <div class="form-group">
                <label for="difficulty">难度级别</label>
                <select id="difficulty">
                    <option value="初级">初级</option>
                    <option value="中级" selected>中级</option>
                    <option value="高级">高级</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="reading_time">预计阅读时间 (分钟)</label>
                <input type="number" id="reading_time" value="3" min="1">
            </div>
            
            <div class="actions">
                <button type="submit" class="btn">添加文章</button>
                <button type="button" class="btn btn-secondary" onclick="loadArticles()">刷新列表</button>
                <button type="button" class="btn btn-danger" onclick="resetForm()">清空表单</button>
            </div>
        </form>
        
        <div class="articles-list">
            <h2>已有的知识文章</h2>
            <div id="articlesContainer"></div>
        </div>
    </div>

    <script>
        // 设置默认日期为今天
        document.getElementById('date').valueAsDate = new Date();
        
        // 标签处理
        let currentTags = [];
        
        document.getElementById('tags').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                addTagFromInput();
            }
        });
        
        function addTagFromInput() {
            const tagInput = document.getElementById('tags');
            const tagValue = tagInput.value.trim();
            
            if (tagValue && !currentTags.includes(tagValue)) {
                currentTags.push(tagValue);
                updateTagsDisplay();
                tagInput.value = '';
            }
        }
        
        function removeTag(tag) {
            currentTags = currentTags.filter(t => t !== tag);
            updateTagsDisplay();
        }
        
        function updateTagsDisplay() {
            const container = document.getElementById('tagsDisplay');
            container.innerHTML = '';
            
            currentTags.forEach(tag => {
                const tagElement = document.createElement('div');
                tagElement.className = 'tag';
                tagElement.innerHTML = `
                    ${tag}
                    <button type="button" onclick="removeTag('${tag}')">×</button>
                `;
                container.appendChild(tagElement);
            });
        }
        
        // 表单提交
        document.getElementById('articleForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const author = document.getElementById('author').value || '专业团队';
            const date = document.getElementById('date').value || new Date().toISOString().split('T')[0];
            const category = document.getElementById('category').value;
            const summary = document.getElementById('summary').value;
            const difficulty = document.getElementById('difficulty').value;
            const readingTime = parseInt(document.getElementById('reading_time').value) || 3;
            
            // 验证必填字段
            if (!title || !content) {
                showNotification('标题和内容为必填项', 'error');
                return;
            }
            
            // 准备新文章对象
            const newArticle = {
                title: title,
                content: content,
                author: author,
                date: date,
                category: category,
                tags: [...currentTags], // 复制标签数组
                summary: summary,
                difficulty: difficulty,
                reading_time: readingTime
            };
            
            // 使用API保存到服务器
            try {
                const response = await fetch('/api/knowledge/articles', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(newArticle)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showNotification('文章添加成功！', 'success');
                    resetForm();
                    loadArticles(); // 刷新列表
                } else {
                    showNotification(result.error || '添加文章失败', 'error');
                }
            } catch (error) {
                console.error('保存文章时出错:', error);
                showNotification('保存文章时出错: ' + error.message, 'error');
            }
        });
        
        // 加载文章列表
        async function loadArticles() {
            try {
                const articles = await loadArticlesFromJson();
                displayArticles(articles);
            } catch (error) {
                console.error('加载文章列表时出错:', error);
                showNotification('加载文章列表时出错: ' + error.message, 'error');
            }
        }
        
        // 从API加载文章
        async function loadArticlesFromJson() {
            const response = await fetch('/api/knowledge/articles');
            const data = await response.json();
            return data || [];
        }
        
        // 显示文章列表
        function displayArticles(articles) {
            const container = document.getElementById('articlesContainer');
            
            if (!articles || articles.length === 0) {
                container.innerHTML = '<p>暂无文章</p>';
                return;
            }
            
            // 按日期排序（最新的在前）
            articles.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            let html = '';
            articles.forEach(article => {
                html += `
                    <div class="article-item">
                        <h3>${article.title}</h3>
                        <p><strong>作者:</strong> ${article.author || '未知'}</p>
                        <p><strong>日期:</strong> ${article.date || '未知'}</p>
                        <p><strong>分类:</strong> ${article.category || '未分类'}</p>
                        <p><strong>难度:</strong> ${article.difficulty || '未指定'}</p>
                        <p><strong>标签:</strong> ${(article.tags || []).join(', ')}</p>
                        <p><strong>摘要:</strong> ${article.summary || '无摘要'}</p>
                        <div class="article-actions">
                            <button class="btn btn-danger" onclick="deleteArticle(${article.id})">删除</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // 删除文章
        async function deleteArticle(id) {
            if (!confirm('确定要删除这篇文章吗？此操作不可撤销。')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/knowledge/articles/${id}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showNotification('文章删除成功！', 'success');
                    loadArticles(); // 刷新列表
                } else {
                    showNotification(result.error || '删除文章失败', 'error');
                }
            } catch (error) {
                console.error('删除文章时出错:', error);
                showNotification('删除文章时出错: ' + error.message, 'error');
            }
        }
        
        // 重置表单
        function resetForm() {
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            document.getElementById('author').value = '专业团队';
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('category').value = '发展心理学';
            document.getElementById('summary').value = '';
            document.getElementById('difficulty').value = '中级';
            document.getElementById('reading_time').value = '3';
            currentTags = [];
            updateTagsDisplay();
            document.getElementById('tags').value = '';
        }
        
        // 显示通知
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 5000);
        }
        
        // 页面加载时初始化
        window.onload = function() {
            loadArticles();
        };
    </script>
</body>
</html>

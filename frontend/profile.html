<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 儿童注意力训练平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #e8f5e8 0%, #c8e6c9 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(90deg, #4caf50 0%, #81c784 99%, #81c784 100%);
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="80" cy="40" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="40" cy="80" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="80" cy="80" r="2" fill="rgba(255,255,255,0.3)"/></svg>');
            animation: float 20s linear infinite;
        }
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }
        .header h1 {
            font-size: 2.2em;
            margin: 0;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: pulse 2s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }
        .nav {
            background-color: white;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 20px;
            flex-wrap: wrap;
        }
        .nav li {
            display: inline;
        }
        .nav a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }
        .nav a:hover::before {
            left: 100%;
        }
        .nav a:hover {
            background-color: #4caf50;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }
        .nav a.active {
            background: linear-gradient(90deg, #4caf50, #81c784);
            color: white;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }
        .container {
            flex: 1;
            max-width: 1800px;
            margin: 0 auto;
            padding: 30px 60px;
        }
        .footer {
            background: linear-gradient(90deg, #2e7d32 0%, #4caf50 100%);
            color: white;
            text-align: center;
            padding: 25px 0;
            margin-top: 40px;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.1);
        }
        .footer p {
            margin: 0;
            font-size: 16px;
            animation: pulse 2s ease-in-out infinite alternate;
        }
        @media (max-width: 768px) {
            .nav ul { gap: 10px; }
            .nav a { font-size: 14px; padding: 10px 15px; }
            .header h1 { font-size: 1.8em; }
            .container { padding: 20px; }
        }

        .profile-report-container {
            background-color: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            width: 1300px;
            max-width: 100%;
            margin: 0 auto;
        }
        .profile-report-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #4caf50, #81c784, #a5d6a7, #c8e6c9);
        }
        .profile-report-container h2 {
            color: #2e7d32;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            animation: bounce 1s ease-in-out infinite alternate;
        }
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }
        .profile-report-content {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .profile-left {
            flex: 1;
            min-width: 0;
        }
        .report-right {
            flex: 2;
            min-width: 0;
        }
        .profile-info-card {
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }
        .profile-info-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        .profile-info-card h3 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #4caf50;
            padding-bottom: 10px;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .profile-info-card:hover h3 {
            color: #2e7d32;
            transform: scale(1.05);
        }
        .profile-info-card .info-item {
            margin-bottom: 15px;
            padding: 10px;
            background-color: rgba(76, 175, 80, 0.05);
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .profile-info-card .info-item:hover {
            background-color: rgba(76, 175, 80, 0.1);
            transform: translateX(5px);
        }
        .profile-info-card .info-label {
            font-weight: bold;
            color: #333;
        }
        .profile-info-card .info-value {
            color: #666;
            margin-left: 10px;
        }
        .report-card {
            background: linear-gradient(135deg, #ffffff 0%, #f9f9f9 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        .report-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #4caf50, #81c784);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        .report-card:hover::before {
            transform: scaleX(1);
        }
        .report-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        .report-card h3 {
            color: #333;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        .report-card:hover h3 {
            color: #2e7d32;
        }
        .report-card p {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .report-card .report-date {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }
        .btn {
            background: linear-gradient(90deg, #4caf50, #81c784);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: pulse 2s ease-in-out infinite alternate;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
        @media (max-width: 768px) {
            .profile-report-content {
                flex-direction: column;
                gap: 15px;
            }
            .profile-left, .report-right {
                flex: none;
                width: 100%;
            }
            .profile-report-container {
                width: 100%;
                padding: 20px;
                border-radius: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>儿童注意力训练平台</h1>
    </div>
    <nav class="nav">
        <ul>
            <li><a href="knowledge.html">科普知识</a></li>
            <li><a href="forum.html">家长论坛</a></li>
            <li><a href="profile.html" class="active">个人中心</a></li>
            <li id="admin-nav-item" style="display: none;"><a href="admin.html">管理</a></li>
            <li><a href="#" onclick="switchToChild()">切换到孩子端</a></li>
            <li><a href="login.html" onclick="logout()">退出登录</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="profile-report-container">
            <h2>个人中心</h2>
            <div class="profile-report-content">
                <div class="profile-left">
                    <div class="profile-info-card">
                        <h3>账号信息</h3>
                        <div class="info-item">
                            <span class="info-label">UID:</span>
                            <span class="info-value" id="profile-uid">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">用户名:</span>
                            <span class="info-value" id="profile-username">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">邮箱:</span>
                            <span class="info-value" id="profile-email">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">注册时间:</span>
                            <span class="info-value" id="profile-created">-</span>
                        </div>
                    </div>
                    <div class="profile-info-card" id="children-info-section">
                        <h3>孩子信息</h3>
                        <div id="children-info-list">
                        </div>
                    </div>
                </div>
                <div class="report-right">
                    <div class="report-card">
                        <h3>综合评估报告</h3>
                        <p>孩子在五个维度的注意力水平评估，包括选择性注意、持续性注意、视觉追踪、工作记忆和抑制控制。</p>
                        <div class="report-date">生成时间: 2026-03-25</div>
                        <button class="btn" onclick="viewReport('assessment/parent.html')">查看详细报告</button>
                    </div>
                    <div class="report-card">
                        <h3>训练进度报告</h3>
                        <p>孩子最近的训练情况，包括训练次数、完成情况和进步趋势。</p>
                        <div class="report-date">生成时间: 2026-03-20</div>
                        <button class="btn">查看详细报告</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>© 2026 注意力训练平台</p>
    </div>

    <script src="utils.js"></script>
    <script>
        function logout() {
            StorageUtil.removeItem('userInfo');
        }

        function switchToChild() {
            const userInfo = StorageUtil.getItem('userInfo');
            if (userInfo) {
                userInfo.role = 'child';
                StorageUtil.setItem('userInfo', userInfo);
                window.location.href = 'child-home.html';
            }
        }

        function checkAuth() {
            const userInfo = StorageUtil.getItem('userInfo');
            if (!userInfo || (userInfo.role !== 'parent' && userInfo.role !== 'admin')) {
                window.location.href = 'login.html';
                return null;
            }
            return userInfo;
        }

        function viewReport(url) {
            window.location.href = url;
        }

        function loadProfileInfo() {
            const userInfo = StorageUtil.getItem('userInfo');
            if (!userInfo) return;
            
            document.getElementById('profile-uid').textContent = userInfo.uid || '-';
            document.getElementById('profile-username').textContent = userInfo.username || '-';
            document.getElementById('profile-email').textContent = userInfo.email || '-';
            
            if (userInfo.role === 'admin') {
                document.getElementById('admin-nav-item').style.display = 'inline';
            }
            
            fetch(`/api/user/info?parent_id=${userInfo.parent_id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.created_at) {
                        document.getElementById('profile-created').textContent = data.created_at.split(' ')[0];
                    }
                })
                .catch(err => console.error('获取用户信息失败:', err));
            
            const childrenInfoList = document.getElementById('children-info-list');
            if (userInfo.children && userInfo.children.length > 0) {
                childrenInfoList.innerHTML = userInfo.children.map(child => `
                    <div class="info-item">
                        <span class="info-label">孩子姓名:</span>
                        <span class="info-value">${child.name}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">孩子年龄:</span>
                        <span class="info-value">${child.age}岁</span>
                    </div>
                `).join('<hr style="border: none; border-top: 1px dashed #ddd; margin: 10px 0;">');
            } else {
                childrenInfoList.innerHTML = '<p style="color: #666;">暂无孩子信息</p>';
            }
        }

        window.onload = function() {
            const userInfo = checkAuth();
            if (userInfo) {
                loadProfileInfo();
            }
        };
    </script>
</body>

</html>

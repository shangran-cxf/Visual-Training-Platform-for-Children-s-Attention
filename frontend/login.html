<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童注意力训练平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            font-size: 1.8em;
            margin: 0;
            font-weight: 600;
        }

        .header-subtitle {
            font-size: 0.95em;
            opacity: 0.9;
            margin-top: 8px;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-card {
            background-color: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
        }

        .login-card h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.5em;
            font-weight: 600;
        }

        .cloud-container {
            position: relative;
            width: 280px;
            height: 160px;
            margin: 0 auto 30px;
        }

        .cloud-img {
            width: 100%;
            height: 100%;
        }

        .eye {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            transition: all 0.15s ease;
        }

        .eye-left {
            top: 60px;
            left: 80px;
            width: 28px;
            height: 40px;
            border-radius: 50% / 60%;
            background-color: white;
        }

        .eye-right {
            top: 60px;
            left: 170px;
            width: 28px;
            height: 40px;
            border-radius: 50% / 60%;
            background-color: white;
        }

        .eye.closed {
            height: 4px;
            border-radius: 2px;
            background-color: black;
        }

        .eye.blink {
            height: 6px;
            border-radius: 2px;
        }

        .pupil {
            width: 16px;
            height: 16px;
            background-color: black;
            border-radius: 50%;
            margin-bottom: 4px;
            transition: all 0.1s ease;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer {
            background: #333;
            color: #999;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }

        .footer p {
            font-size: 13px;
        }

        .error-message {
            color: #f44336;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            padding: 10px;
            background: #ffebee;
            border-radius: 8px;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>儿童注意力训练平台</h1>
        <p class="header-subtitle">专为6-12岁儿童设计的注意力训练平台</p>
    </div>
    <div class="container">
        <div class="login-card">
            <h2>登录</h2>
            
            <div class="cloud-container">
                <img src="https://pub-940ccf6255b54fa799a9b01050e6c227.r2.dev/cloud.jpg" alt="cartoon cloud" class="cloud-img">
                <div class="eye eye-left" id="eye-left">
                    <div class="pupil" id="pupil-left"></div>
                </div>
                <div class="eye eye-right" id="eye-right">
                    <div class="pupil" id="pupil-right"></div>
                </div>
            </div>
            
            <div id="error-message" class="error-message"></div>
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button class="btn" onclick="login()">登录</button>
            <p class="register-link">还没有账号？<a href="register.html">立即注册</a></p>
        </div>
    </div>
    <div class="footer">
        <p>© 2026 注意力训练平台</p>
    </div>
    <script src="utils.js"></script>
    <script>
        let isTypingPassword = false;
        let cursorX = 0;
        let cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            cursorX = e.clientX;
            cursorY = e.clientY;
            updateEyes();
        });

        function updateEyes() {
            if (isTypingPassword) return;

            const offsetX = ((cursorX / window.innerWidth) - 0.5) * 40;
            const offsetY = ((cursorY / window.innerHeight) - 0.5) * 20;

            const pupilLeft = document.getElementById('pupil-left');
            const pupilRight = document.getElementById('pupil-right');

            if (pupilLeft && pupilRight) {
                pupilLeft.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
                pupilRight.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            }
        }

        function startBlinking() {
            setInterval(() => {
                if (!isTypingPassword) {
                    const eyeLeft = document.getElementById('eye-left');
                    const eyeRight = document.getElementById('eye-right');
                    
                    if (eyeLeft && eyeRight) {
                        eyeLeft.classList.add('blink');
                        eyeRight.classList.add('blink');
                        
                        setTimeout(() => {
                            eyeLeft.classList.remove('blink');
                            eyeRight.classList.remove('blink');
                        }, 200);
                    }
                }
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('password');
            const eyeLeft = document.getElementById('eye-left');
            const eyeRight = document.getElementById('eye-right');

            if (passwordInput) {
                passwordInput.addEventListener('focus', () => {
                    isTypingPassword = true;
                    if (eyeLeft && eyeRight) {
                        eyeLeft.classList.add('closed');
                        eyeRight.classList.add('closed');
                    }
                });

                passwordInput.addEventListener('blur', () => {
                    isTypingPassword = false;
                    if (eyeLeft && eyeRight) {
                        eyeLeft.classList.remove('closed');
                        eyeRight.classList.remove('closed');
                    }
                });
            }

            startBlinking();
        });

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            if (!username || !password) {
                errorMessage.textContent = '请输入用户名和密码';
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    const userInfo = UserStateUtil.initFromLoginResponse(result);
                    // 登录后默认设置为家长模式
                    UserStateUtil.switchToParentMode();
                    // 跳转到家长页面
                     window.location.href = 'profile.html';
                } else {
                    errorMessage.textContent = result.error || '用户名或密码错误';
                }
            } catch (error) {
                console.error('登录失败:', error);
                errorMessage.textContent = '登录失败，请稍后再试';
            }
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科普知识 - 儿童注意力训练平台</title>
    <script src="utils.js"></script>
    <script src="components-parent.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* body样式会被components-parent.js覆盖 */

        /* ====================== */
        /* 搜索框样式（带特效） */
        /* ====================== */
        .search-container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto 20px;
        }

        .search-box {
            display: flex;
            align-items: center;
            height: 60px;
            background: #fff;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            padding: 0 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        /* 点击后特效（图二） */
        .search-box.active {
            background: linear-gradient(135deg, #fce7f3 0%, #f3e8ff 100%);
            border-color: #a855f7;
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
        }

        .search-icon {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            color: #9ca3af;
            transition: color 0.3s ease;
        }

        .search-box.active .search-icon {
            color: #7c3aed;
        }

        .search-input {
            flex: 1;
            height: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
        }

        .search-btn {
            padding: 8px 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: white;
            border: none;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }

        /* 原有页面样式 */
        .knowledge-header {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 14px;
            color: #666;
            min-width: 80px;
        }

        .filter-btn {
            padding: 8px 16px;
            background: #f5f5f5;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #773ada;
            color: white;
        }

        .knowledge-section {
            background: white;
            border-radius: 20px;
            padding: 24px;
        }

        .knowledge-articles {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .knowledge-card {
            padding: 20px;
            border-radius: 16px;
            background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .knowledge-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border-color: #667eea;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #343559;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            line-height: 1.4;
            flex: 1;
        }

        .card-title:hover {
            color: #667eea;
        }

        .card-difficulty {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .difficulty-easy {
            background: #e8f5e9;
            color: #4caf50;
        }

        .difficulty-medium {
            background: #fff3e0;
            color: #ff9800;
        }

        .difficulty-hard {
            background: #ffebee;
            color: #f44336;
        }

        .card-summary {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .card-tag {
            font-size: 12px;
            padding: 4px 10px;
            background: #f5f5f5;
            color: #666;
            border-radius: 12px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
            font-size: 12px;
            color: #999;
        }

        .card-meta {
            display: flex;
            gap: 15px;
        }

        .card-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-state-text {
            font-size: 14px;
        }

        #article-detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 10px;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #f5f5f5;
            color: #666;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: #667eea;
            color: white;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-right: 40px;
        }

        .modal-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .modal-meta-item {
            font-size: 13px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
        }

        .modal-tag {
            font-size: 12px;
            padding: 4px 12px;
            background: linear-gradient(135deg, #773ada 0%, #451594 100%);
            color: white;
            border-radius: 12px;
        }

        .modal-summary {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .modal-summary-label {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .modal-content-text {
            font-size: 15px;
            line-height: 1.8;
            color: #333;
        }

        .modal-content-text p {
            margin-bottom: 15px;
            text-indent: 2em;
        }

        @media (max-width: 768px) {
            .knowledge-articles {
                grid-template-columns: 1fr;
            }

            .main-content {
                padding: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="main-content">
        <div class="knowledge-header">
            <!-- 搜索框（一定显示） -->
            <div class="search-container">
                <div class="search-box" id="searchBox">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索知识文章...">
                    <button class="search-btn" onclick="doSearch()">搜索</button>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-group">
                    <label class="filter-label">发布时间：</label>
                    <div class="filter-options" id="date-filter">
                        <button class="filter-btn active" data-value="">全部</button>
                        <button class="filter-btn" data-value="week">最近一周</button>
                        <button class="filter-btn" data-value="month">最近一月</button>
                        <button class="filter-btn" data-value="quarter">最近三月</button>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">难度等级：</label>
                    <div class="filter-options" id="difficulty-filter">
                        <button class="filter-btn active" data-value="">全部</button>
                        <button class="filter-btn" data-value="初级">初级</button>
                        <button class="filter-btn" data-value="中级">中级</button>
                        <button class="filter-btn" data-value="高级">高级</button>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">阅读时间：</label>
                    <div class="filter-options" id="readtime-filter">
                        <button class="filter-btn active" data-value="">全部</button>
                        <button class="filter-btn" data-value="short">5分钟以内</button>
                        <button class="filter-btn" data-value="medium">5-10分钟</button>
                        <button class="filter-btn" data-value="long">10分钟以上</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="knowledge-section">
            <div class="section-title">注意力科普知识</div>
            <div class="knowledge-articles" id="knowledge-articles-container"></div>
        </div>
    </div>

    <!-- 搜索框动画（核心） -->
    <script>
        window.onload = function () {
            ParentComponents.initPage('knowledge');
            const userInfo = ParentComponents.checkAuth();
            if (userInfo) {
                initFilterListeners();
                loadKnowledgeArticles();
            }
        };

        let currentDateFilter = '';
        let currentDifficultyFilter = '';
        let currentReadtimeFilter = '';
        let currentKeyword = '';
        let allArticles = [];

        function logout() { ParentComponents.logout(); }
        function switchToChild() { ParentComponents.switchToChildMode(); }
        function checkAuth() { return ParentComponents.checkAuth(); }

        async function doSearch() {
            currentKeyword = document.getElementById('searchInput').value.trim();
            await loadKnowledgeArticles();
        }

        async function loadKnowledgeArticles() {
            const container = document.getElementById('knowledge-articles-container');
            container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⏳</div><div class="empty-state-text">加载中...</div></div>';
            try {
                let url = '/api/knowledge/articles';
                if (currentKeyword) url = '/api/knowledge/articles/search?keyword=' + encodeURIComponent(currentKeyword);
                const response = await fetch(url);
                const data = await response.json();
                allArticles = Array.isArray(data) ? data : (data.articles || []);
                applyFiltersAndDisplay();
            } catch (error) {
                console.error(error);
                try {
                    const localResponse = await fetch('./knowledge/knowledge-data.json');
                    const localData = await localResponse.json();
                    allArticles = Array.isArray(localData) ? localData : (localData.articles || []);
                    applyFiltersAndDisplay();
                } catch (localError) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❌</div><div class="empty-state-text">加载失败</div></div>';
                }
            }
        }

        function filterByDate(a) {
            if (!currentDateFilter) return true;
            const d = new Date(a.date); const now = new Date();
            const days = (now - d) / (1000 * 60 * 60 * 24);
            if (currentDateFilter === 'week') return days <= 7;
            if (currentDateFilter === 'month') return days <= 30;
            if (currentDateFilter === 'quarter') return days <= 90;
            return true;
        }
        function filterByDifficulty(a) { return !currentDifficultyFilter || a.difficulty === currentDifficultyFilter; }
        function filterByReadtime(a) {
            if (!currentReadtimeFilter) return true;
            const t = a.reading_time || a.readTime || 0;
            if (currentReadtimeFilter === 'short') return t <= 5;
            if (currentReadtimeFilter === 'medium') return t > 5 && t <= 10;
            if (currentReadtimeFilter === 'long') return t > 10;
            return true;
        }
        function filterByKeyword(a) {
            if (!currentKeyword) return true;
            const k = currentKeyword.toLowerCase();
            return (a.title?.toLowerCase().includes(k) || a.summary?.toLowerCase().includes(k) || a.content?.toLowerCase().includes(k) || a.tags?.some(t => t.toLowerCase().includes(k)));
        }
        function applyFiltersAndDisplay() {
            const filtered = allArticles.filter(a => filterByDate(a) && filterByDifficulty(a) && filterByReadtime(a) && filterByKeyword(a));
            displayKnowledgeArticles(filtered);
        }

        function displayKnowledgeArticles(articles) {
            const c = document.getElementById('knowledge-articles-container');
            if (!articles || articles.length === 0) {
                c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">暂无文章</div></div>';
                return;
            }
            articles.sort((a, b) => new Date(b.date) - new Date(a.date));
            let html = '';
            articles.forEach(a => {
                const tags = a.tags ? a.tags.map(t => `<span class="card-tag">${t}</span>`).join('') : '';
                let diffCls = '';
                if (a.difficulty === '初级') diffCls = 'difficulty-easy';
                else if (a.difficulty === '中级') diffCls = 'difficulty-medium';
                else if (a.difficulty === '高级') diffCls = 'difficulty-hard';
                const summary = a.summary || (a.content.length > 120 ? a.content.substring(0, 120) + '...' : a.content);
                html += `
                <div class="knowledge-card" onclick="showArticleDetail(${a.id})">
                    <div class="card-header">
                        <div class="card-title">${a.title}</div>
                        ${a.difficulty ? `<span class="card-difficulty ${diffCls}">${a.difficulty}</span>` : ''}
                    </div>
                    <div class="card-summary">${summary}</div>
                    ${tags ? `<div class="card-tags">${tags}</div>` : ''}
                    <div class="card-footer">
                        <div class="card-meta">
                            <span>👤 ${a.author || '未知'}</span>
                            <span>📅 ${a.date || '-'}</span>
                            ${a.reading_time ? `<span>⏱️ ${a.reading_time}分钟</span>` : ''}
                        </div>
                        <span style="color:#667eea;font-weight:500;">阅读全文 →</span>
                    </div>
                </div>`;
            });
            c.innerHTML = html;
            window.knowledgeArticlesData = articles;
        }

        function formatArticleContent(c) {
            let f = c.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
            return `<p>${f}</p>`;
        }
        function showArticleDetail(id) {
            const a = window.knowledgeArticlesData.find(x => x.id === id);
            if (!a) return;
            const tags = a.tags ? a.tags.map(t => `<span class="modal-tag">${t}</span>`).join('') : '';
            let diffCls = '';
            if (a.difficulty === '初级') diffCls = 'difficulty-easy';
            else if (a.difficulty === '中级') diffCls = 'difficulty-medium';
            else if (a.difficulty === '高级') diffCls = 'difficulty-hard';
            const content = formatArticleContent(a.content);
            const m = document.createElement('div');
            m.id = 'article-detail-modal';
            m.innerHTML = `
            <div class="modal-content">
                <button class="modal-close" onclick="closeArticleDetail()">×</button>
                <h2 class="modal-title">${a.title}</h2>
                <div class="modal-meta">
                    ${a.difficulty ? `<span class="card-difficulty ${diffCls}">${a.difficulty}</span>` : ''}
                    <span class="modal-meta-item">📁 ${a.category || '未分类'}</span>
                    <span class="modal-meta-item">👤 ${a.author || '未知'}</span>
                    <span class="modal-meta-item">📅 ${a.date || '-'}</span>
                    ${a.reading_time ? `<span class="modal-meta-item">⏱️ ${a.reading_time}分钟</span>` : ''}
                </div>
                ${tags ? `<div class="modal-tags">${tags}</div>` : ''}
                ${a.summary ? `<div class="modal-summary"><div class="modal-summary-label">摘要</div><div>${a.summary}</div></div>` : ''}
                <div class="modal-content-text">${content}</div>
            </div>`;
            document.body.appendChild(m);
            m.onclick = e => e.target === m && closeArticleDetail();
            document.addEventListener('keydown', e => e.key === 'Escape' && closeArticleDetail());
        }
        function closeArticleDetail() {
            const m = document.getElementById('article-detail-modal');
            m && m.remove();
        }

        function initFilterListeners() {
            document.querySelectorAll('#date-filter .filter-btn').forEach(b => {
                b.onclick = () => {
                    document.querySelectorAll('#date-filter .filter-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active'); currentDateFilter = b.dataset.value; applyFiltersAndDisplay();
                }
            });
            document.querySelectorAll('#difficulty-filter .filter-btn').forEach(b => {
                b.onclick = () => {
                    document.querySelectorAll('#difficulty-filter .filter-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active'); currentDifficultyFilter = b.dataset.value; applyFiltersAndDisplay();
                }
            });
            document.querySelectorAll('#readtime-filter .filter-btn').forEach(b => {
                b.onclick = () => {
                    document.querySelectorAll('#readtime-filter .filter-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active'); currentReadtimeFilter = b.dataset.value; applyFiltersAndDisplay();
                }
            });
        }

        const searchBox = document.getElementById("searchBox");
        const searchInput = document.getElementById("searchInput");

        // 点击/聚焦 开启特效
        searchInput.addEventListener("focus", () => {
            searchBox.classList.add("active");
        });

        // 失去焦点 关闭特效
        searchInput.addEventListener("blur", () => {
            searchBox.classList.remove("active");
        });

        // 回车键搜索
        searchInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') doSearch();
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科普知识 - 儿童注意力训练平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #e8f5e8 0%, #c8e6c9 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(90deg, #4caf50 0%, #81c784 99%, #81c784 100%);
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="80" cy="40" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="40" cy="80" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="80" cy="80" r="2" fill="rgba(255,255,255,0.3)"/></svg>');
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(100px, 100px);
            }
        }

        .header h1 {
            font-size: 2.2em;
            margin: 0;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: pulse 2s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.03);
            }
        }

        .nav {
            background-color: white;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav li {
            display: inline;
        }

        .nav a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .nav a:hover::before {
            left: 100%;
        }

        .nav a:hover {
            background-color: #4caf50;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .nav a.active {
            background: linear-gradient(90deg, #4caf50, #81c784);
            color: white;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .container {
            flex: 1;
            max-width: 1800px;
            margin: 0 auto;
            padding: 30px 60px;
        }

        .footer {
            background: linear-gradient(90deg, #2e7d32 0%, #4caf50 100%);
            color: white;
            text-align: center;
            padding: 25px 0;
            margin-top: 40px;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.1);
        }

        .footer p {
            margin: 0;
            font-size: 16px;
            animation: pulse 2s ease-in-out infinite alternate;
        }

        @media (max-width: 768px) {
            .nav ul {
                gap: 10px;
            }

            .nav a {
                font-size: 14px;
                padding: 10px 15px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 20px;
            }
        }

        .knowledge-section {
            background-color: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            width: 1300px;
            max-width: 100%;
            margin: 0 auto;
        }

        .knowledge-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #4caf50, #81c784, #a5d6a7, #c8e6c9);
        }

        .knowledge-section h2 {
            color: #2e7d32;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            animation: bounce 1s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-5px);
            }
        }

        .knowledge-articles {
            margin-bottom: 30px;
            width: 100%;
        }

        .knowledge-article {
            background: linear-gradient(135deg, #ffffff 0%, #f9f9f9 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .knowledge-article::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #4caf50, #81c784);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .knowledge-article:hover::before {
            transform: scaleX(1);
        }

        .knowledge-article:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .knowledge-article h3 {
            color: #333;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .knowledge-article:hover h3 {
            color: #2e7d32;
        }

        .knowledge-article p {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .knowledge-article .article-meta {
            font-size: 14px;
            color: #999;
        }

        #article-detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease-in-out;
            padding: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .knowledge-section {
                width: 100%;
                padding: 20px;
                border-radius: 15px;
            }

            #article-detail-modal {
                padding: 5px;
                align-items: flex-start;
            }

            #article-detail-modal>div {
                max-height: 95vh;
                border-radius: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>儿童注意力训练平台</h1>
    </div>
    <nav class="nav">
        <ul>
            <li><a href="knowledge.html" class="active">科普知识</a></li>
            <li><a href="forum.html">家长论坛</a></li>
            <li><a href="profile.html">个人中心</a></li>
            <li id="admin-nav-item" style="display: none;"><a href="admin.html">管理</a></li>
            <li><a href="#" onclick="switchToChild()">切换到孩子端</a></li>
            <li><a href="login.html" onclick="logout()">退出登录</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="knowledge-section">
            <h2>注意力科普知识</h2>
            <div class="knowledge-articles" id="knowledge-articles-container">
            </div>
        </div>
    </div>
    <div class="footer">
        <p>© 2026 注意力训练平台</p>
    </div>

    <script src="utils.js"></script>
    <script>
        function logout() {
            StorageUtil.removeItem('userInfo');
        }

        function switchToChild() {
            const userInfo = StorageUtil.getItem('userInfo');
            if (userInfo) {
                userInfo.role = 'child';
                StorageUtil.setItem('userInfo', userInfo);
                window.location.href = 'child-home.html';
            }
        }

        function checkAuth() {
            const userInfo = StorageUtil.getItem('userInfo');
            if (!userInfo || (userInfo.role !== 'parent' && userInfo.role !== 'admin')) {
                window.location.href = 'login.html';
                return null;
            }
            return userInfo;
        }

        function loadKnowledgeArticles() {
            fetch('/api/knowledge/articles')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应失败: ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    const articles = Array.isArray(data) ? data : (data.articles || []);
                    displayKnowledgeArticles(articles);
                })
                .catch(error => {
                    console.error('加载知识文章时出错:', error);
                    fetch('./knowledge/knowledge-data.json')
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('本地文件加载失败: ' + response.status);
                            }
                            return response.json();
                        })
                        .then(data => {
                            const articles = Array.isArray(data) ? data : (data.articles || []);
                            displayKnowledgeArticles(articles);
                        })
                        .catch(localError => {
                            console.error('本地文件加载也失败:', localError);
                            const container = document.getElementById('knowledge-articles-container');
                            container.innerHTML = '<p style="text-align: center; color: #f44336;">加载知识内容失败，请稍后再试。</p>';
                        });
                });
        }

        function displayKnowledgeArticles(articles) {
            const container = document.getElementById('knowledge-articles-container');

            if (!articles || articles.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">暂无知识文章</p>';
                return;
            }

            articles.sort((a, b) => new Date(b.date) - new Date(a.date));

            let articlesHTML = '';
            articles.forEach(article => {
                const tagsString = article.tags ? article.tags.join(', ') : '';

                let difficultyBadge = '';
                if (article.difficulty) {
                    let difficultyColor = '#9e9e9e';
                    if (article.difficulty === '初级') difficultyColor = '#4CAF50';
                    else if (article.difficulty === '中级') difficultyColor = '#FF9800';
                    else if (article.difficulty === '高级') difficultyColor = '#F44336';

                    difficultyBadge = `<span style="background-color: ${difficultyColor}; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; margin-right: 5px;">${article.difficulty}</span>`;
                }

                const readingTimeString = article.reading_time ? `${article.reading_time}分钟阅读` : '';

                const previewContent = article.content.length > 100
                    ? article.content.substring(0, 100) + '...'
                    : article.content;

                articlesHTML += `
                    <div class="knowledge-article" onclick="showArticleDetail(${article.id})" style="cursor: pointer;">
                        <h3>${article.title}</h3>
                        ${article.summary ? `<p style="color: #666; font-style: italic;"><strong>摘要:</strong> ${article.summary}</p>` : ''}
                        <p style="color: #888;">${previewContent}</p>
                        <div class="article-meta">
                            ${difficultyBadge}
                            作者: ${article.author} | 
                            发布时间: ${article.date} | 
                            分类: ${article.category} |
                            ${readingTimeString} |
                            标签: ${tagsString}
                        </div>
                        <div style="text-align: center; margin-top: 10px; color: #4CAF50; font-weight: bold;">
                            点击查看完整内容 →
                        </div>
                    </div>
                `;
            });

            container.innerHTML = articlesHTML;
            window.knowledgeArticlesData = articles;
        }

        function formatArticleContent(content) {
            let formatted = content
                .replace(/\n\n/g, '</p><p style="text-indent: 2em; margin-bottom: 15px; line-height: 1.8;">')
                .replace(/\n/g, '<br>');
            return `<p style="text-indent: 2em; margin-bottom: 15px; line-height: 1.8;">${formatted}</p>`;
        }

        function showArticleDetail(articleId) {
            const article = window.knowledgeArticlesData.find(a => a.id === articleId);
            if (!article) {
                console.error('未找到文章:', articleId);
                return;
            }

            const tagsString = article.tags ? article.tags.map(tag =>
                `<span style="background: #e8f5e9; color: #2e7d32; padding: 4px 12px; border-radius: 15px; margin: 2px; display: inline-block;">${tag}</span>`
            ).join('') : '';

            let difficultyBadge = '';
            if (article.difficulty) {
                let difficultyColor = '#9e9e9e';
                if (article.difficulty === '初级') difficultyColor = '#4CAF50';
                else if (article.difficulty === '中级') difficultyColor = '#FF9800';
                else if (article.difficulty === '高级') difficultyColor = '#F44336';

                difficultyBadge = `<span style="background-color: ${difficultyColor}; color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.9em;">${article.difficulty}</span>`;
            }

            const formattedContent = formatArticleContent(article.content);

            const modal = document.createElement('div');
            modal.id = 'article-detail-modal';

            const modalContent = document.createElement('div');
            modalContent.style.cssText = `
                background: linear-gradient(135deg, #ffffff 0%, #f9f9f9 100%);
                border-radius: 20px;
                padding: 40px;
                width: 90%;
                max-width: 900px;
                max-height: 85vh;
                overflow-y: auto;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
                position: relative;
                animation: bounceIn 0.5s ease-in-out;
                border: 4px solid #4caf50;
            `;

            const bodyContent = document.createElement('div');
            bodyContent.innerHTML = `
                <button onclick="closeArticleDetail()" style="
                    position: absolute;
                    top: 15px;
                    right: 15px;
                    background: linear-gradient(135deg, #f44336, #ef5350);
                    color: white;
                    border: none;
                    width: 40px;
                    height: 40px;
                    border-radius: 50%;
                    font-size: 20px;
                    cursor: pointer;
                    box-shadow: 0 4px 10px rgba(244, 67, 54, 0.3);
                    transition: all 0.3s ease;
                    z-index: 10;
                " onmouseover="this.style.transform='scale(1.1) rotate(90deg)';" onmouseout="this.style.transform='scale(1) rotate(0deg)';">×</button>
                <h2 style="color: #2e7d32; margin-bottom: 20px; font-size: 1.8em; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1); padding-right: 50px;">${article.title}</h2>
                <div style="margin-bottom: 20px; padding: 15px; background: #f5f5f5; border-radius: 10px;">
                    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px;">
                        ${difficultyBadge}
                        <span style="color: #666;">📁 ${article.category || '未分类'}</span>
                        <span style="color: #666;">👤 ${article.author || '未知'}</span>
                        <span style="color: #666;">📅 ${article.date || '-'}</span>
                        ${article.reading_time ? `<span style="color: #666;">⏱️ ${article.reading_time}分钟</span>` : ''}
                    </div>
                    ${tagsString ? `<div style="margin-top: 10px;">${tagsString}</div>` : ''}
                </div>
                ${article.summary ? `<div style="background: #e8f5e9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #4caf50;"><strong style="color: #2e7d32;">摘要：</strong><span style="color: #666;">${article.summary}</span></div>` : ''}
                <div class="article-content" style="line-height: 1.8; color: #333; font-size: 1.05em;">
                    ${formattedContent}
                </div>
            `;

            modalContent.appendChild(bodyContent);
            modal.appendChild(modalContent);
            document.body.appendChild(modal);

            modal.addEventListener('click', function (e) {
                if (e.target === modal) {
                    closeArticleDetail();
                }
            });

            document.addEventListener('keydown', function escHandler(e) {
                if (e.key === 'Escape') {
                    closeArticleDetail();
                    document.removeEventListener('keydown', escHandler);
                }
            });
        }

        function closeArticleDetail() {
            const modal = document.getElementById('article-detail-modal');
            if (modal) {
                modal.remove();
            }
        }

        window.onload = function () {
            const userInfo = checkAuth();
            if (userInfo) {
                if (userInfo.role === 'admin') {
                    document.getElementById('admin-nav-item').style.display = 'inline';
                }
                loadKnowledgeArticles();
            }
        };
    </script>
</body>

</html>

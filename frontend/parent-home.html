<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童注意力训练平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #e8f5e8 0%, #c8e6c9 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(90deg, #4caf50 0%, #81c784 99%, #81c784 100%);
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="80" cy="40" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="40" cy="80" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="80" cy="80" r="2" fill="rgba(255,255,255,0.3)"/></svg>');
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(100px, 100px);
            }
        }

        .header h1 {
            font-size: 2.2em;
            margin: 0;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: pulse 2s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.03);
            }
        }

        .nav {
            background-color: white;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav li {
            display: inline;
        }

        .nav a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .nav a:hover::before {
            left: 100%;
        }

        .nav a:hover {
            background-color: #4caf50;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .nav a.active {
            background: linear-gradient(90deg, #4caf50, #81c784);
            color: white;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .container {
            flex: 1;
            max-width: 1800px;
            margin: 0 auto;
            padding: 30px 60px;
        }

        .section {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section.active {
            display: block;
        }

        .forum-section,
        .report-section,
        .profile-section,
        .knowledge-section {
            background-color: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            width: 1300px;
            max-width: 100%;
            margin: 0 auto;
        }

        .forum-section::before,
        .report-section::before,
        .profile-section::before,
        .knowledge-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #4caf50, #81c784, #a5d6a7, #c8e6c9);
        }

        .section h2 {
            color: #2e7d32;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            animation: bounce 1s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-5px);
            }
        }

        .forum-posts {
            margin-bottom: 30px;
            width: 100%;
        }

        .new-post-container {
            margin-bottom: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;

        .new-post-btn {
            width: 150px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            position: relative;
            overflow: hidden;
            transform-origin: center;
        }

        .new-post-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;

        .new-post-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .new-post-btn:hover::before {
            left: 100%;
        }

        .new-post-btn:active {
            transform: translateY(-1px);
        }

        .new-post-btn.expanded {
            border-radius: 15px 15px 0 0;
            background: #45a049;
            width: 100%;
        }

        .new-post-form {
            background: linear-gradient(135deg, #ffffff 0%, #f9f9f9 100%);
            border-radius: 0 0 15px 15px;
            padding: 0 25px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: scaleY(0);
            transform-origin: top;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .new-post-form.show {
            max-height: 500px;
            padding: 25px;
            opacity: 1;
            transform: scaleY(1);
        }

        .forum-posts {
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4caf50;
        }

        .forum-post {
            background: linear-gradient(135deg, #ffffff 0%, #f9f9f9 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            width: 100%;
            min-width: 800px;
        }

        .forum-post::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #4caf50, #81c784);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .forum-post:hover::before {
            transform: scaleX(1);
        }

        .forum-post:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .forum-post h3 {
            color: #333;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .forum-post:hover h3 {
            color: #2e7d32;
        }

        .forum-post p {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .forum-post .post-content {
            transition: all 0.3s ease;
        }

        .forum-post .post-content.hidden {
            display: none;
        }

        .forum-post .post-meta {
            font-size: 14px;
            color: #999;
            margin-bottom: 10px;
        }

        .post-actions {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .action-btn {
            background: none;
            border: 1px solid #4caf50;
            color: #4caf50;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;

        .action-btn:hover {

        .action-btn.liked {

        }

        }

        .action-btn.delete-btn:hover {
            background-color: #ff9800;
            color: white;
        }

        .post-comments.show {

        .comment .comment-meta {

        .comment-actions {

        .comment-form {

        .comment-form textarea {

            margin: 0;

        }

        @media (max-width: 1400px) {
            .forum-section,
            .report-section,
            .profile-section,
            .knowledge-section,

        @media (max-width: 768px) {
            .nav ul {

            .header h1 {
                font-size: 1.8em;

            .section h2 {

            .forum-section,
            .report-section,
            .profile-section,
            .knowledge-section,

            /* 浮窗响应式样式 */

        @media (max-width: 480px) {

                    <div class="profile-left">
                        <div class="profile-info-card">
                            <h3>账号信息</h3>

                            <div class="info-item">
                                <span class="info-label">邮箱:</span>
                                <span class="info-value" id="profile-email">-</span>

                        </div>
                        <div class="profile-info-card" id="children-info-section">

                    </div>
                    <div class="report-right">
                        <div class="report-card">
                            <h3>综合评估报告</h3>
                            <p>孩子在五个维度的注意力水平评估，包括选择性注意、持续性注意、视觉追踪、工作记忆和抑制控制。</p>
                            <div class="report-date">生成时间: 2026-03-25</div>

        <div id="admin" class="section">

                                    <option value="注意力类型">注意力类型</option>

                                    <option value="中级" selected>中级</option>
                                    <option value="高级">高级</option>

                        <div class="form-group">
                            <label>标签 (用逗号分隔)</label>

                    <div class="admin-list-card">
                        <h3>已有文章 <span id="knowledge-count"></span></h3>
                        <div id="admin-knowledge-list">
                            <!-- 文章列表将通过JavaScript动态加载 -->

                <div id="forum-manage-tab" class="admin-tab-content" style="display: none;">
                    <div class="admin-list-card">
                        <h3>帖子管理 <span id="post-count"></span></h3>

                            <!-- 帖子列表将通过JavaScript动态加载 -->

    <div class="footer">
        <p>© 2026 注意力训练平台</p>
    </div>
    
    <script src="utils.js"></script>
    <script>
        // 显示指定板块
        function showSection(sectionId) {
            // 隐藏所有板块
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            // 显示选中的板块
            document.getElementById(sectionId).classList.add('active');

            // 更新导航栏状态
            document.querySelectorAll('.nav a').forEach(link => {
                link.classList.remove('active');
            });
            document.querySelector(`.nav a[href="#${sectionId}"]`).classList.add('active');
            
            // 如果进入管理页面，加载科普知识列表
            if (sectionId === 'admin') {
                loadAdminKnowledgeList();
            }
        }

        // 查看报告
        function viewReport(url) {
            window.location.href = url;
        }

        // 退出登录
        function logout() {
            StorageUtil.removeItem('userInfo');
        }

        // 切换到孩子端
        function switchToChild() {
            const userInfo = StorageUtil.getItem('userInfo');
            if (userInfo) {
                userInfo.role = 'child';
                StorageUtil.setItem('userInfo', userInfo);
                window.location.href = 'child-home.html';
            }
        }

        // 论坛功能

        // 初始化论坛数据
        let currentPage = 1;
        const perPage = 10;
        
        async function loadPosts(page = 1) {
            currentPage = page;
            try {
                const response = await fetch(`/api/forum/posts?page=${page}&per_page=${perPage}`);
                const result = await response.json();
                
                const postsContainer = document.getElementById('forum-posts');
                postsContainer.innerHTML = '';
                
                if (result.posts && result.posts.length > 0) {
                    result.posts.forEach(post => {
                        const postHTML = createPostHTML(post);
                        postsContainer.innerHTML += postHTML;
                    });
                } else {
                    postsContainer.innerHTML = '<p style="text-align: center; color: #666; padding: 40px;">暂无帖子，快来发布第一个帖子吧！</p>';
                }
                
                renderPagination(result.total_pages, page);
            } catch (error) {
                console.error('加载帖子失败:', error);
                document.getElementById('forum-posts').innerHTML = '<p style="text-align: center; color: #f44336; padding: 40px;">加载失败，请刷新重试</p>';
            }
        }
        
        function toggleNewPostForm() {
            const btn = document.getElementById('new-post-btn');
            const form = document.getElementById('new-post-form');
            const forumPosts = document.querySelector('.forum-posts');
            const container = document.querySelector('.new-post-container');
            
            if (form.classList.contains('show')) {
                // 收起时：先收表单，再收按钮
                form.classList.remove('show');
                if (forumPosts) {
                    forumPosts.style.transform = 'translateY(0)';
                }
                // 延迟收起按钮
                setTimeout(() => {
                    btn.style.width = '150px';
                    btn.classList.remove('expanded');
                }, 250);
            } else {
                // 展开时：先展按钮，再展表单
                const containerWidth = container.offsetWidth;
                btn.style.width = containerWidth + 'px';
                btn.classList.add('expanded');
                // 延迟展开表单
                setTimeout(() => {
                    form.classList.add('show');
                    if (forumPosts) {
                        forumPosts.style.transform = 'translateY(20px)';
                    }
                }, 200);
            }
        }
        
        function createPostHTML(post) {
            const userInfo = StorageUtil.getItem('userInfo');
            const isAdmin = userInfo && userInfo.role === 'admin';
            const isOwner = userInfo && userInfo.parent_id === post.parent_id;
            const canDelete = isAdmin || isOwner;
            
            const contentPreview = post.content.length > 150 ? post.content.substring(0, 150) + '...' : post.content;
            const deleteBtn = canDelete ? `
                <button class="action-btn delete-btn" onclick="deletePost(${post.id})">
                    🗑️ 删除
                </button>
            ` : '';
            
            return `
                <div class="forum-post" data-post-id="${post.id}" id="post-${post.id}">
                    <h3>${post.title}</h3>
                    <div class="post-content" id="post-content-${post.id}">
                        <p>${contentPreview}</p>
                    </div>
                    <div class="post-meta">发帖人: ${post.author_name} | 发布时间: ${post.created_at} | 浏览: ${post.view_count}</div>
                    <div class="post-actions">
                        <button class="action-btn" onclick="toggleComments(${post.id})">
                            💬 ${post.comment_count}
                        </button>
                        <button class="action-btn like-btn" id="like-btn-${post.id}" onclick="likePost(${post.id})">
                            👍 ${post.like_count}
                        </button>
                        <button class="action-btn dislike-btn" id="dislike-btn-${post.id}" onclick="dislikePost(${post.id})">
                            👎 ${post.dislike_count}
                        </button>
                        ${deleteBtn}
                    </div>
                    <div class="post-comments" id="comments-${post.id}" style="display: none;">
                        <div class="comments-list" id="comments-list-${post.id}"></div>
                        <div class="comment-form">
                            <textarea id="comment-content-${post.id}" placeholder="写下你的评论..."></textarea>
                            <button class="btn" onclick="addComment(${post.id})">发表评论</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        async function deletePost(postId) {
            if (!confirm('确定要删除这篇帖子吗？')) return;
            
            const userInfo = StorageUtil.getItem('userInfo');
            if (!userInfo) {
                alert('请先登录');
                return;
            }
            
            try {
                const response = await fetch(`/api/forum/posts/${postId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        parent_id: userInfo.parent_id
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    loadPosts(currentPage);
                    alert('删除成功');
                } else {
                    alert(result.error || '删除失败');
                }
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败，请稍后再试');
            }
        }
        
        function renderPagination(totalPages, currentPage) {
            const paginationContainer = document.getElementById('forum-pagination');
            paginationContainer.innerHTML = '';
            
            if (totalPages <= 1) return;
            
            if (currentPage > 1) {
                paginationContainer.innerHTML += `<button class="btn" style="padding: 8px 16px; font-size: 14px;" onclick="loadPosts(${currentPage - 1})">上一页</button>`;
            }
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    paginationContainer.innerHTML += `<button class="btn" style="padding: 8px 16px; font-size: 14px; background-color: #45a049;">${i}</button>`;
                } else {
                    paginationContainer.innerHTML += `<button class="btn" style="padding: 8px 16px; font-size: 14px; background-color: #666;" onclick="loadPosts(${i})">${i}</button>`;
                }
            }
            
            if (currentPage < totalPages) {
                paginationContainer.innerHTML += `<button class="btn" style="padding: 8px 16px; font-size: 14px;" onclick="loadPosts(${currentPage + 1})">下一页</button>`;
            }
        }
        
        async function createPost() {
            const title = document.getElementById('post-title').value.trim();
            const content = document.getElementById('post-content').value.trim();
            
            if (!title || !content) {
                alert('请填写标题和内容');
                return;
            }
            
            const userInfo = StorageUtil.getItem('userInfo');
            if (!userInfo || !userInfo.parent_id) {
                alert('请先登录');
                return;
            }
            
            try {
                const response = await fetch('/api/forum/posts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        parent_id: userInfo.parent_id,
                        title: title,
                        content: content
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('post-title').value = '';
                    document.getElementById('post-content').value = '';
                    toggleNewPostForm();
                    loadPosts(1);
                    alert('发帖成功！');
                } else {
                    alert(result.error || '发帖失败');
                }
            } catch (error) {
                console.error('发帖失败:', error);
                alert('发帖失败，请稍后再试');
            }
        }
        
        async function toggleComments(postId) {
            const commentsDiv = document.getElementById(`comments-${postId}`);
            const commentsList = document.getElementById(`comments-list-${postId}`);
            
            if (commentsDiv.style.display === 'none') {
                commentsDiv.style.display = 'block';
                await loadComments(postId);
            } else {
                commentsDiv.style.display = 'none';
            }
        }
        
        async function loadComments(postId) {
            const commentsList = document.getElementById(`comments-list-${postId}`);
            
            try {
                const response = await fetch(`/api/forum/comments?post_id=${postId}`);
                const comments = await response.json();
                
                commentsList.innerHTML = '';
                
                if (comments && comments.length > 0) {
                    comments.forEach(comment => {
                        commentsList.innerHTML += `
                            <div class="comment">
                                <div class="comment-meta">${comment.author_name} | ${comment.created_at}</div>
                                <p>${comment.content}</p>
                                <div class="comment-actions">
                                    <button class="action-btn like-btn" style="font-size: 12px; padding: 4px 10px;" onclick="likeComment(${comment.id})">
                                        👍 ${comment.like_count}
                                    </button>
                                    <button class="action-btn dislike-btn" style="font-size: 12px; padding: 4px 10px;" onclick="dislikeComment(${comment.id})">
                                        👎 ${comment.dislike_count}
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    commentsList.innerHTML = '<p style="color: #666; padding: 10px;">暂无评论</p>';
                }
            } catch (error) {
                console.error('加载评论失败:', error);
                commentsList.innerHTML = '<p style="color: #f44336;">加载评论失败</p>';
            }
        }
        
        async function likePost(postId) {
            const userInfo = StorageUtil.getItem('userInfo');
            if (!userInfo || !userInfo.parent_id) {
                alert('请先登录');
                return;
            }
            
            const likeBtn = document.getElementById(`like-btn-${postId}`);
            const dislikeBtn = document.getElementById(`dislike-btn-${postId}`);
            
            likeBtn.classList.add('liked');
            dislikeBtn.classList.remove('disliked');
            
            const postContent = document.getElementById(`post-content-${postId}`);
            if (postContent) {
                postContent.style.display = 'block';
            }
            
            try {
                await fetch('/api/forum/vote', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        parent_id: userInfo.parent_id,
                        post_id: postId,
                        vote_type: 1
                    })
                });
                
                loadPosts(currentPage);
            } catch (error) {
                console.error('点赞失败:', error);
            }
        }
        
        async function dislikePost(postId) {
            const userInfo = StorageUtil.getItem('userInfo');
            if (!userInfo || !userInfo.parent_id) {
                alert('请先登录');
                return;
            }
            
            const likeBtn = document.getElementById(`like-btn-${postId}`);
            const dislikeBtn = document.getElementById(`dislike-btn-${postId}`);
            
            dislikeBtn.classList.add('disliked');
            likeBtn.classList.remove('liked');
            
            const postContent = document.getElementById(`post-content-${postId}`);
            if (postContent) {
                postContent.style.display = 'none';
            }
            
            try {
                await fetch('/api/forum/vote', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        parent_id: userInfo.parent_id,
                        post_id: postId,
                        vote_type: -1
                    })
                });
            } catch (error) {
                console.error('踩失败:', error);
            }
        }
        
        async function likeComment(commentId) {
            const userInfo = StorageUtil.getItem('userInfo');
            if (!userInfo || !userInfo.parent_id) return;
            
            try {
                await fetch('/api/forum/vote', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        parent_id: userInfo.parent_id,
                        comment_id: commentId,
                        vote_type: 1
                    })
                });

        function loadKnowledgeArticles() {
            fetch('/api/knowledge/articles')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应失败: ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    const articles = Array.isArray(data) ? data : (data.articles || []);
                    displayKnowledgeArticles(articles);
                })
                .catch(error => {
                    console.error('加载知识文章时出错:', error);
                    // 如果API加载失败，回退到本地文件
                    fetch('./knowledge/knowledge-data.json')
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('本地文件加载失败: ' + response.status);
                            }
                            return response.json();
                        })
                        .then(data => {
                            const articles = Array.isArray(data) ? data : (data.articles || []);
                            displayKnowledgeArticles(articles);

                        .catch(localError => {

        // 格式化文章内容：支持换行、段落缩进、标题等
        function formatArticleContent(content) {
            if (!content) return '';
            
            // 按换行符分割成段落
            const paragraphs = content.split(/\n+/);
            
            let formatted = '';
            paragraphs.forEach(para => {
                para = para.trim();
                if (!para) return;
                
                // 检测是否是标题（以数字+点或中文数字开头）
                const isHeading = /^(\d+[\.\、]|[一二三四五六七八九十]+[\.\、：:])\s*/.test(para);
                
                // 检测是否是列表项（以 - 或 • 开头）
                const isListItem = /^[-•]\s*/.test(para);
                
                if (isHeading) {
                    // 标题样式
                    formatted += `<h4 style="
                        color: #2e7d32;
                        margin: 20px 0 10px 0;
                        padding: 8px 12px;
                        background: linear-gradient(90deg, #e8f5e9, transparent);
                        border-left: 4px solid #4caf50;
                        font-size: 1.05em;
                        font-weight: bold;
                    ">${para}</h4>`;
                } else if (isListItem) {
                    // 列表项样式
                    const text = para.replace(/^[-•]\s*/, '');
                    formatted += `<div style="
                        margin: 8px 0;
                        padding-left: 20px;
                        position: relative;
                        line-height: 2;
                        text-indent: 0;
                    "><span style="
                        position: absolute;
                        left: 0;
                        color: #4caf50;
                    ">•</span>${text}</div>`;
                } else {
                    // 普通段落样式（首行缩进两格）
                    formatted += `<p style="
                        margin: 12px 0;
                        text-indent: 2em;
                        line-height: 2;
                        text-align: justify;
                        color: #333;
                    ">${para}</p>`;
                }
            });
            
            return formatted;
        }

                ${tagsString ? `
                    <div style="margin-top: 20px; padding-top: 15px; border-top: 2px solid #e0e0e0;">
                        <h3 style="color: #e65100; margin: 0 0 8px 0; font-size: 0.95em;">🏷️ 标签</h3>
                        <div style="display: flex; flex-wrap: wrap; gap: 5px;">
                            ${tagsString}
                        </div>
                    </div>
                ` : ''}
            `;
            
            modalContent.appendChild(header);
            modalContent.appendChild(bodyContent);
            modal.appendChild(modalContent);
            
            document.body.appendChild(modal);
            
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeArticleDetail();
                }
            });
            
            document.addEventListener('keydown', function escHandler(e) {
                if (e.key === 'Escape') {
                    closeArticleDetail();
                    document.removeEventListener('keydown', escHandler);
                }
            });
        }

        function loadProfileInfo() {
            const userInfo = StorageUtil.getItem('userInfo');
            if (!userInfo) return;
            
            document.getElementById('profile-uid').textContent = userInfo.uid || '-';
            document.getElementById('profile-username').textContent = userInfo.username || '-';
            document.getElementById('profile-email').textContent = userInfo.email || '-';
            
            fetch(`/api/user/info?parent_id=${userInfo.parent_id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.created_at) {
                        document.getElementById('profile-created').textContent = data.created_at.split(' ')[0];
                    }
                })
                .catch(err => console.error('获取用户信息失败:', err));
            
            const childrenInfoList = document.getElementById('children-info-list');
            if (userInfo.children && userInfo.children.length > 0) {
                childrenInfoList.innerHTML = userInfo.children.map(child => `
                    <div class="info-item">
                        <span class="info-label">孩子姓名:</span>
                        <span class="info-value">${child.name}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">孩子年龄:</span>
                        <span class="info-value">${child.age}岁</span>
                    </div>
                `).join('<hr style="border: none; border-top: 1px dashed #ddd; margin: 10px 0;">');
            } else {
                childrenInfoList.innerHTML = '<p style="color: #666;">暂无孩子信息</p>';
            }
        }

        window.onload = function () {
            const userInfo = StorageUtil.getItem('userInfo');
            if (!userInfo || (userInfo.role !== 'parent' && userInfo.role !== 'admin')) {
                window.location.href = 'login.html';
            } else {
                loadProfileInfo();
                loadKnowledgeArticles();
                loadPosts(1);
                
                if (userInfo.role === 'admin') {
                    document.getElementById('admin-nav-item').style.display = 'block';
                }
            }
        };
        
        function showAdminTab(tabId) {
            document.querySelectorAll('.admin-tab-content').forEach(content => {
                content.style.display = 'none';
            });
            document.querySelectorAll('.admin-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(tabId).style.display = 'block';
            event.target.classList.add('active');
            
            if (tabId === 'knowledge-manage-tab') {
                loadAdminKnowledgeList();
            } else if (tabId === 'forum-manage-tab') {
                loadAdminForumList();
            }
        }
        
        async function loadAdminKnowledgeList() {
            try {
                const response = await fetch('/api/knowledge/articles');
                const data = await response.json();
                const articles = Array.isArray(data) ? data : (data.articles || []);
                
                document.getElementById('knowledge-count').textContent = `(${articles.length}篇)`;
                
                const listContainer = document.getElementById('admin-knowledge-list');
                if (articles.length === 0) {
                    listContainer.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">暂无文章</p>';
                    return;
                }
                
                listContainer.innerHTML = articles.map(article => `
                    <div class="admin-article-item" onclick='openArticleDetail(${JSON.stringify(article).replace(/'/g, "&#39;")})' style="cursor: pointer;">
                        <div class="admin-article-info">
                            <h4>${article.title}</h4>
                            <div class="admin-article-meta">
                                <span>📁 ${article.category || '未分类'}</span>
                                <span>👤 ${article.author || '未知'}</span>
                                <span>📅 ${article.date || '-'}</span>
                                <span>📊 ${article.difficulty || '未指定'}</span>
                            </div>
                        </div>
                        <button class="action-btn delete-btn" onclick="event.stopPropagation(); deleteKnowledgeArticle(${article.id})">
                            🗑️ 删除
                        </button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载文章列表失败:', error);
            }
        }
        
        async function addKnowledgeArticle() {
            const title = document.getElementById('admin-knowledge-title').value.trim();
            const content = document.getElementById('admin-knowledge-content').value.trim();
            const category = document.getElementById('admin-knowledge-category').value;
            const summary = document.getElementById('admin-knowledge-summary').value.trim();
            const difficulty = document.getElementById('admin-knowledge-difficulty').value;
            const tags = document.getElementById('admin-knowledge-tags').value.trim();
            const author = document.getElementById('admin-knowledge-author').value.trim() || '管理员';
            const readingTime = parseInt(document.getElementById('admin-knowledge-reading-time').value) || 3;
            
            if (!title || !content) {
                alert('请填写标题和内容');
                return;
            }
            
            try {
                const response = await fetch('/api/knowledge/articles', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        content: content,
                        category: category,
                        summary: summary,
                        difficulty: difficulty,
                        tags: tags ? tags.split(',').map(t => t.trim()) : [],
                        author: author,
                        reading_time: readingTime,
                        date: new Date().toISOString().split('T')[0]
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    resetKnowledgeForm();
                    loadAdminKnowledgeList();
                    loadKnowledgeArticles();
                    alert('添加成功');
                } else {
                    alert(result.error || '添加失败');
                }
            } catch (error) {
                console.error('添加文章失败:', error);
                alert('添加失败，请稍后再试');
            }
        }
        
        function resetKnowledgeForm() {
            document.getElementById('admin-knowledge-title').value = '';
            document.getElementById('admin-knowledge-content').value = '';
            document.getElementById('admin-knowledge-summary').value = '';
            document.getElementById('admin-knowledge-tags').value = '';
            document.getElementById('admin-knowledge-author').value = '管理员';
            document.getElementById('admin-knowledge-reading-time').value = '3';
            document.getElementById('admin-knowledge-category').value = '发展心理学';
            document.getElementById('admin-knowledge-difficulty').value = '中级';
        }
        
        async function deleteKnowledgeArticle(articleId) {
            if (!confirm('确定要删除这篇文章吗？')) return;
            
            try {
                const response = await fetch(`/api/knowledge/articles/${articleId}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    loadAdminKnowledgeList();
                    loadKnowledgeArticles();
                    alert('删除成功');
                } else {
                    alert(result.error || '删除失败');
                }
            } catch (error) {
                console.error('删除文章失败:', error);
                alert('删除失败，请稍后再试');
            }
        }
        
        async function loadAdminForumList() {
            try {
                const response = await fetch('/api/forum/posts?per_page=100');
                const data = await response.json();
                const posts = data.posts || [];
                
                document.getElementById('post-count').textContent = `(${data.total}篇)`;
                
                const listContainer = document.getElementById('admin-forum-list');
                if (posts.length === 0) {
                    listContainer.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">暂无帖子</p>';
                    return;
                }
                
                listContainer.innerHTML = posts.map(post => `
                    <div class="admin-post-item">
                        <div class="admin-post-header">
                            <h4>${post.title}</h4>
                            <button class="action-btn delete-btn" onclick="adminDeletePost(${post.id})">
                                🗑️ 删除
                            </button>
                        </div>
                        <div class="admin-post-content">${post.content.substring(0, 100)}${post.content.length > 100 ? '...' : ''}</div>
                        <div class="admin-post-footer">
                            <div>
                                <span>👤 ${post.author_name}</span>
                                <span style="margin-left: 15px;">📅 ${post.created_at}</span>
                            </div>
                            <div>
                                <span>👁️ ${post.view_count || 0}</span>
                                <span style="margin-left: 10px;">💬 ${post.comment_count || 0}</span>
                                <span style="margin-left: 10px;">👍 ${post.like_count || 0}</span>
                                <span style="margin-left: 10px;">👎 ${post.dislike_count || 0}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载帖子列表失败:', error);
            }
        }
        
        async function adminDeletePost(postId) {
            if (!confirm('确定要删除这篇帖子吗？')) return;
            
            const userInfo = StorageUtil.getItem('userInfo');
            
            try {
                const response = await fetch(`/api/forum/posts/${postId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        parent_id: userInfo.parent_id
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    loadAdminForumList();
                    loadPosts(1);
                    alert('删除成功');
                } else {
                    alert(result.error || '删除失败');
                }
            } catch (error) {
                console.error('删除帖子失败:', error);
                alert('删除失败，请稍后再试');
            }
        }
    </script>
</body>

</html>

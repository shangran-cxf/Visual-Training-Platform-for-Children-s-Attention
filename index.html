<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>儿童专注力视觉训练系统</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 顶部导航栏-->
  <div class="navbar">
    <div class="logo">儿童专注力训练</div>
    <div class="nav-items">
      <div class="nav-item">介绍</div>
      <div class="nav-item" onclick="openLogin()">登录</div>
      <div class="nav-item">关于我们</div>
    </div>
  </div>

  <!-- 海报区域 -->
  <div class="poster">
    <!-- 更换图片 -->
    <img src="c:\Users\HUAWEI\Desktop\img-1760259732411d27486812748e7a915ee9010462a1c72.jpg" alt="训练海报">
  </div>

  <!-- 登录弹窗 -->
  <div class="modal" id="loginModal">
    <div class="modal-content">
      <h2>用户登录</h2>
      <input type="text" id="username" placeholder="请输入账号"><br>
      <input type="password" id="password" placeholder="请输入密码"><br>
      <button onclick="login()">登录</button>
      <button onclick="closeLogin()" style="background: #666;">取消</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
